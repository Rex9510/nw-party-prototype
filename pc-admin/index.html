<script>
(function () {
  function hasDemoSession() {
    try {
      if (sessionStorage.getItem('nw_admin_demo_session')) return true;
    } catch (e) {}
    try {
      if (localStorage.getItem('nw_admin_demo_session')) return true;
    } catch (e) {}
    return false;
  }
  try {
    var p = (location.pathname || '').toLowerCase();
    if (p.indexOf('login.html') !== -1) return;
    if (!hasDemoSession()) {
      location.replace('login.html');
    }
  } catch (e) {
    location.replace('login.html');
  }
})();

/** 全局原型反馈（各页按钮/菜单共用） */
const prototypeToastRef = { set: null };
function showPrototypeToast(text, type) {
  if (prototypeToastRef.set) prototypeToastRef.set({ text, type: type || 'success' });
}

function nwPcMemberAvatarKey(memberId) {
  return 'nw_pc_member_avatar_' + String(memberId == null || memberId === '' ? 'create' : memberId);
}

function readNwPcMemberAvatar(memberId) {
  try {
    var v = localStorage.getItem(nwPcMemberAvatarKey(memberId));
    if (typeof v === 'string' && /^data:image\//i.test(v.trim())) return v.trim();
  } catch (e0) {}
  return '';
}

function writeNwPcMemberAvatar(memberId, dataUrl) {
  try {
    var k = nwPcMemberAvatarKey(memberId);
    if (dataUrl && typeof dataUrl === 'string') localStorage.setItem(k, dataUrl);
    else localStorage.removeItem(k);
  } catch (e1) {}
}

/** 头像大图预览（与小程序原型 showNwAvatarLightbox 行为一致） */
function showNwAvatarLightbox(opts) {
  opts = opts || {};
  var imageSrc = typeof opts.imageSrc === 'string' ? opts.imageSrc.trim() : '';
  var letterRaw = typeof opts.letter === 'string' ? opts.letter.trim() : '';
  var letter = letterRaw ? letterRaw.charAt(0) : '?';
  var caption = typeof opts.caption === 'string' ? opts.caption.trim() : '';
  var hint = opts.hint || '点击空白处、右上角 × 或「关闭」退出';
  var id = 'nw-pc-avatar-lightbox-root';
  var old = document.getElementById(id);
  if (old) try { old.remove(); } catch (e0) {}

  function close() {
    try {
      document.removeEventListener('keydown', onKey);
    } catch (e1) {}
    try {
      el.remove();
    } catch (e2) {}
  }
  function onKey(e) {
    if (e.key === 'Escape') close();
  }

  var el = document.createElement('div');
  el.id = id;
  el.setAttribute('role', 'dialog');
  el.setAttribute('aria-modal', 'true');
  el.setAttribute('aria-label', '头像预览');
  el.style.cssText =
    'position:fixed;inset:0;z-index:20050;background:rgba(0,0,0,0.88);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;box-sizing:border-box';
  el.addEventListener('click', function (e) {
    if (e.target === el) close();
  });

  var xbtn = document.createElement('button');
  xbtn.type = 'button';
  xbtn.setAttribute('aria-label', '关闭');
  xbtn.textContent = '×';
  xbtn.style.cssText =
    'position:fixed;top:16px;right:20px;width:44px;height:44px;border-radius:50%;border:none;background:rgba(255,255,255,0.14);color:#fff;font-size:26px;line-height:1;cursor:pointer;z-index:20051';
  xbtn.onclick = function (e) {
    e.stopPropagation();
    close();
  };

  var panel = document.createElement('div');
  panel.style.cssText =
    'max-width:100%;max-height:86vh;display:flex;flex-direction:column;align-items:center;gap:14px;pointer-events:none';

  var size = Math.min(Math.floor(window.innerWidth * 0.42), 360);
  var hasImg = imageSrc && (imageSrc.indexOf('data:image') === 0 || /^https?:\/\//i.test(imageSrc));

  if (hasImg) {
    var img = document.createElement('img');
    img.src = imageSrc;
    img.alt = caption || '头像';
    img.style.cssText =
      'width:' +
      size +
      'px;height:' +
      size +
      'px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,0.2);box-shadow:0 12px 48px rgba(0,0,0,0.45);pointer-events:auto';
    panel.appendChild(img);
  } else {
    var fs = Math.max(44, Math.floor(size * 0.36));
    var circle = document.createElement('div');
    circle.textContent = letter;
    circle.style.cssText =
      'width:' +
      size +
      'px;height:' +
      size +
      'px;border-radius:50%;background:linear-gradient(160deg,#FFF0EE,#D44040);display:flex;align-items:center;justify-content:center;font-size:' +
      fs +
      'px;font-weight:700;color:#fff;font-family:Noto Serif SC,serif;border:3px solid rgba(255,255,255,0.25);box-sizing:border-box;pointer-events:auto';
    panel.appendChild(circle);
  }

  if (caption) {
    var cap = document.createElement('div');
    cap.textContent = caption;
    cap.style.cssText = 'color:#fff;font-size:17px;font-weight:600;text-align:center;max-width:90vw;pointer-events:auto';
    panel.appendChild(cap);
  }
  var hi = document.createElement('div');
  hi.textContent = hint;
  hi.style.cssText = 'color:rgba(255,255,255,0.55);font-size:12px;text-align:center;max-width:320px;line-height:1.55;pointer-events:auto';
  panel.appendChild(hi);

  var btn = document.createElement('button');
  btn.type = 'button';
  btn.textContent = '关闭';
  btn.style.cssText =
    'margin-top:6px;padding:11px 40px;border-radius:999px;border:1px solid rgba(255,255,255,0.35);background:rgba(255,255,255,0.12);color:#fff;font-size:14px;font-weight:600;cursor:pointer;pointer-events:auto';
  btn.onclick = function (e) {
    e.stopPropagation();
    close();
  };
  panel.appendChild(btn);

  el.appendChild(panel);
  el.appendChild(xbtn);
  document.body.appendChild(el);
  document.addEventListener('keydown', onKey);
}

/** 按 sortOrder 排序后重排为 0…n-1，与小程序展示顺序一致 */
function normalizeLiveSessionsOrder(sessions) {
  if (!Array.isArray(sessions) || sessions.length === 0) return [];
  const arr = sessions.map((s, i) => ({ ...s, _orig: i }));
  arr.sort((a, b) => {
    const ao = Number(a.sortOrder);
    const bo = Number(b.sortOrder);
    const av = Number.isFinite(ao) ? ao : a._orig;
    const bv = Number.isFinite(bo) ? bo : b._orig;
    if (av !== bv) return av - bv;
    return a._orig - b._orig;
  });
  return arr.map(({ _orig, ...rest }, i) => ({ ...rest, sortOrder: i }));
}

/** 新建场次时生成唯一 id（演示：前端模拟后端发号） */
function generateLiveSessionId(existingList) {
  const ids = new Set((existingList || []).map((s) => String(s && s.id)));
  let id = '';
  do {
    id = `ls_${Date.now().toString(36)}${Math.random().toString(36).slice(2, 9)}`;
  } while (ids.has(id));
  return id;
}

function normalizeNwLearningRuntime(o) {
  const base = nwLearningRuntimeDefaults();
  const platformLinks = { ...base.platformLinks, ...(o.platformLinks || {}) };
  let liveSessions = [];
  if (Array.isArray(o.liveSessions) && o.liveSessions.length > 0) {
    liveSessions = o.liveSessions.map((s, i) => ({
      ...defaultLiveSession(i),
      ...s,
      id: (s && s.id) ? String(s.id) : 'ls_' + (i + 1),
    }));
  } else if (o.liveEntryUrl) {
    liveSessions = [{
      ...defaultLiveSession(0),
      entryUrl: String(o.liveEntryUrl),
      password: o.livePassword != null ? String(o.livePassword) : '',
    }];
  } else {
    liveSessions = JSON.parse(JSON.stringify(base.liveSessions));
  }
  liveSessions = normalizeLiveSessionsOrder(liveSessions);
  return {
    platformLinks,
    liveSessions,
    shenXiaoFuMiniLink: o.shenXiaoFuMiniLink != null ? String(o.shenXiaoFuMiniLink) : base.shenXiaoFuMiniLink,
  };
}

function readNwLearningRuntimeMerged() {
  const base = nwLearningRuntimeDefaults();
  const key = getNwLearningRuntimeStorageKey();
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return JSON.parse(JSON.stringify(base));
    return normalizeNwLearningRuntime(JSON.parse(raw));
  } catch (e) {
    return JSON.parse(JSON.stringify(base));
  }
}

function persistNwLearningRuntime(obj) {
  const key = getNwLearningRuntimeStorageKey();
  try {
    localStorage.setItem(key, JSON.stringify(obj));
  } catch (e) {
    showPrototypeToast('无法写入本地存储：' + (e && e.message ? e.message : '请检查浏览器设置'), 'error');
    return;
  }
  if (typeof BroadcastChannel !== 'undefined') {
    try {
      const bc = new BroadcastChannel(getNwLearningRuntimeBC());
      bc.postMessage({ t: 'update' });
      bc.close();
    } catch (e2) {}
  }
}

function memberSeedHash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = ((h << 5) - h) + str.charCodeAt(i) | 0;
  return Math.abs(h);
}

/** 近 6 个月演示序列：活动场次、直播场次、录播观看次数 */
function getMemberMonthlyTrend(member) {
  const h = memberSeedHash(`${member.id}|${member.name}|${member.rating}`);
  const months = ['2025-11', '2025-12', '2026-01', '2026-02', '2026-03', '2026-04'];
  return months.map((month, i) => {
    const bump = ((h >> (i * 4)) & 15) % 5;
    const bump2 = ((h >> (i * 3 + 5)) & 7) % 4;
    const bump3 = ((h >> (i * 2 + 9)) & 11) % 6;
    const activities = Math.min(14, Math.max(0, 2 + (h % 3) + i + bump - (i === 2 ? 1 : 0)));
    const live = Math.min(6, Math.max(0, 1 + (i % 2) + bump2 + (i > 4 ? 1 : 0)));
    const replay = Math.min(36, Math.max(3, 5 + i * 3 + bump3 + (h % 4)));
    return { month, activities, live, replay };
  });
}

function AiMonthlyTrendChart({ data, memberId }) {
  const W = 720;
  const H = 248;
  const padL = 48;
  const padR = 20;
  const padT = 44;
  const padB = 36;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const n = data.length || 1;
  const maxY = Math.max(8, ...(data.length ? data.flatMap((d) => [d.activities, d.live, d.replay]) : [8])) * 1.1;
  const xAt = (i) => padL + (n <= 1 ? innerW / 2 : (i / (n - 1)) * innerW);
  const yAt = (v) => padT + innerH - (v / maxY) * innerH;
  const uid = String(memberId || 'x').replace(/\W/g, '_');
  const series = [
    { key: 'activities', label: '参加活动', color: T.primary, grad: `aiTrendA_${uid}` },
    { key: 'live', label: '参加直播', color: '#2563EB', grad: `aiTrendL_${uid}` },
    { key: 'replay', label: '录播观看', color: T.success, grad: `aiTrendR_${uid}` },
  ];
  const lineD = (key) =>
    data.map((d, i) => `${i === 0 ? 'M' : 'L'}${xAt(i).toFixed(1)},${yAt(d[key]).toFixed(1)}`).join(' ');
  const areaD = (key) => {
    if (!data.length) return '';
    let d = `M${xAt(0).toFixed(1)},${yAt(data[0][key]).toFixed(1)}`;
    for (let i = 1; i < data.length; i++) d += ` L${xAt(i).toFixed(1)},${yAt(data[i][key]).toFixed(1)}`;
    const y0 = padT + innerH;
    d += ` L${xAt(n - 1).toFixed(1)},${y0.toFixed(1)} L${xAt(0).toFixed(1)},${y0.toFixed(1)} Z`;
    return d;
  };
  const yTicks = [0, 0.25, 0.5, 0.75, 1].map((t) => ({
    y: padT + innerH * (1 - t),
    lab: t === 0 ? 0 : Math.round(maxY * t),
  }));
  const monthShort = (m) => {
    const p = m.split('-');
    return p[1] ? `${parseInt(p[1], 10)}月` : m;
  };
  return (
    <div style={{ width: '100%', overflowX: 'auto' }}>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet" style={{ display: 'block', maxHeight: 280 }}>
        <defs>
          {series.map((s) => (
            <linearGradient key={s.grad} id={s.grad} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={s.color} stopOpacity="0.22" />
              <stop offset="100%" stopColor={s.color} stopOpacity="0" />
            </linearGradient>
          ))}
        </defs>
        {yTicks.map((t, i) => (
          <g key={i}>
            <line x1={padL} y1={t.y} x2={W - padR} y2={t.y} stroke="#EDE9E4" strokeWidth={i === yTicks.length - 1 ? 1.2 : 1} />
            <text x={padL - 6} y={t.y + 4} textAnchor="end" fontSize={10} fill={T.textMuted}>{t.lab}</text>
          </g>
        ))}
        {series.map((s) => (
          <path key={s.key} d={areaD(s.key)} fill={`url(#${s.grad})`} />
        ))}
        {series.map((s) => (
          <path key={`ln-${s.key}`} d={lineD(s.key)} fill="none" stroke={s.color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
        ))}
        {series.map((s) =>
          data.map((d, i) => (
            <circle key={`${s.key}-${i}`} cx={xAt(i)} cy={yAt(d[s.key])} r="4.5" fill={T.surface} stroke={s.color} strokeWidth="2" />
          ))
        )}
        {data.map((d, i) => (
          <text key={i} x={xAt(i)} y={H - 12} textAnchor="middle" fontSize={11} fill={T.textSecondary} fontFamily="'Noto Serif SC', serif">
            {monthShort(d.month)}
          </text>
        ))}
        <g transform={`translate(${padL}, 14)`}>
          {series.map((s, i) => (
            <g key={s.label} transform={`translate(${i * 172}, 0)`}>
              <rect width="10" height="10" rx="2" fill={s.color} />
              <text x="14" y="9" fontSize={11} fill={T.textPrimary}>{s.label}</text>
            </g>
          ))}
        </g>
      </svg>
    </div>
  );
}

function PcMemberPhotoUploader({ memberId, demoName }) {
  const keyId = memberId == null || memberId === '' ? 'create' : memberId;
  const letter = (demoName && String(demoName).trim().charAt(0)) || '党';
  const [url, setUrl] = React.useState(() => readNwPcMemberAvatar(keyId));
  const inp = React.useRef(null);
  const onFile = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    if (!/^image\//i.test(f.type)) {
      showPrototypeToast('请选择图片文件', 'error');
      e.target.value = '';
      return;
    }
    if (f.size > 2.5 * 1024 * 1024) {
      showPrototypeToast('单张请小于约 2.5MB（演示）', 'error');
      e.target.value = '';
      return;
    }
    const r = new FileReader();
    r.onload = () => {
      const u = String(r.result || '');
      writeNwPcMemberAvatar(keyId, u);
      setUrl(u);
      showPrototypeToast('照片已载入预览（演示，仅存本机）');
    };
    r.readAsDataURL(f);
    e.target.value = '';
  };
  return (
    <div style={{ marginBottom: 22 }}>
      <label style={{ fontSize: 13, fontWeight: 600, color: T.textPrimary, display: 'block', marginBottom: 10 }}>个人照片</label>
      <div style={{ display: 'flex', gap: 20, alignItems: 'flex-start', flexWrap: 'wrap' }}>
        <button
          type="button"
          onClick={() => showNwAvatarLightbox({ imageSrc: url, letter, caption: (demoName || '党员') + ' · 档案照' })}
          style={{
            width: 88, height: 88, borderRadius: '50%', border: `2px solid ${T.border}`, padding: 0, overflow: 'hidden', cursor: 'pointer', flexShrink: 0,
            background: url ? '#fff' : T.primaryLight, color: T.primary, fontSize: 32, fontWeight: 700, fontFamily: "'Noto Serif SC', serif",
            display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: T.cardShadow,
          }}
        >
          {url ? <img src={url} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover' }} /> : letter}
        </button>
        <div style={{ flex: 1, minWidth: 220 }}>
          <input ref={inp} type="file" accept="image/jpeg,image/png,image/webp,image/gif" style={{ display: 'none' }} onChange={onFile} />
          <div
            onClick={() => inp.current && inp.current.click()}
            onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); inp.current && inp.current.click(); } }}

            style={{ border: `2px dashed ${url ? T.success : T.border}`, borderRadius: 10, padding: '22px 16px', textAlign: 'center', background: url ? '#ECFDF5' : T.bg, cursor: 'pointer' }}

            <div style={{ color: T.textMuted, marginBottom: 8, display: 'flex', justifyContent: 'center' }}><I.User /></div>
            <p style={{ fontSize: 13, color: T.textPrimary, fontWeight: 600 }}>{url ? '已选择照片 · 点击重新上传' : '点击或拖拽上传个人照片'}</p>
            <p style={{ fontSize: 12, color: T.textMuted, marginTop: 4 }}>支持 JPG/PNG/WebP/GIF；左侧头像可点击放大查看</p>

/** 原型：党员编号 → 姓名、支部（用于手动补录演示） */
const partyMemberLookup = {
  DY001: { name: '张伟', branch: '南湾街道 南湾社区第一党支部' },
  DY002: { name: '李娜', branch: '南湾街道 南湾社区第一党支部' },
  DY003: { name: '王强', branch: '南湾街道 康乐社区第二党支部' },

  DY20240308001: { name: '何静', branch: '南湾街道 康乐社区第二党支部' },
  DY20240308002: { name: '黄磊', branch: '南湾街道 丹竹头社区第三党支部' },
  DY20240308003: { name: '周敏', branch: '南湾街道 南湾社区第一党支部' },
};

const partyMemberRoster = Object.entries(partyMemberLookup).map(([memberNo, v]) => ({ memberNo, name: v.name, branch: v.branch }));

/** 按编号前缀/包含，或按姓名、支部子串模糊匹配 */
function matchPartyMembers(query, roster) {
  const q = query.trim();
  if (!q) return [];
  const compact = q.replace(/\s+/g, '');
  const looksLikeId = /^DY[0-9A-Z]*$/i.test(compact);
  let list;
  if (looksLikeId) {
    const qu = compact.toUpperCase();
    list = roster.filter(r => r.memberNo.toUpperCase().includes(qu));
  } else {
    list = roster.filter(r => r.name.includes(q) || r.branch.includes(q));
  }
  const score = (r) => {
    let s = 0;
    if (r.name === q) s += 100;
    else if (r.name.startsWith(q)) s += 50;
    else if (r.name.includes(q)) s += 20;
    if (r.branch.includes(q)) s += 5;
    return s;
  };
  list.sort((a, b) => score(b) - score(a));
  const seen = new Set();
  return list.filter((r) => {
    if (seen.has(r.memberNo)) return false;
    seen.add(r.memberNo);
    return true;
  }).slice(0, 12);
}

function parseActivityStartMinutes(dateStr) {
  if (!dateStr) return null;
  const part = String(dateStr).trim().split(/\s+/)[1];
  if (!part) return null;
  const start = part.split('-')[0];
  const [h, m] = start.split(':').map(x => parseInt(x, 10));
  if (Number.isNaN(h)) return null;
  return h * 60 + (Number.isNaN(m) ? 0 : m);
}

function checkinStatusFromActivityTime(activity) {
  const startMins = parseActivityStartMinutes(activity?.date);
  if (startMins == null) return Math.random() > 0.25 ? '准时' : '迟到';
  const now = new Date();
  const nowMins = now.getHours() * 60 + now.getMinutes();
  const GRACE_MIN = 15;
  return nowMins <= startMins + GRACE_MIN ? '准时' : '迟到';
}

  const [records, setRecords] = React.useState(checkinRecords[activity.id] || []);
  const [manualId, setManualId] = React.useState('');
  const [committedPick, setCommittedPick] = React.useState(null);
  const [suggestOpen, setSuggestOpen] = React.useState(false);
  const suggestBlurTimer = React.useRef(null);
  const [manualBusy, setManualBusy] = React.useState(false);
  const [toast, setToast] = React.useState(null);

  const suggestQuery = committedPick ? '' : manualId;
  const nameMatches = React.useMemo(
    () => matchPartyMembers(suggestQuery, partyMemberRoster),
    [suggestQuery],
  );

  React.useEffect(() => {
    if (!toast) return;
    const t = setTimeout(() => setToast(null), 2800);
    return () => clearTimeout(t);
  }, [toast]);

  React.useEffect(() => () => {
    if (suggestBlurTimer.current) window.clearTimeout(suggestBlurTimer.current);
  }, []);

  const onTime = records.filter(r => r.status === '准时').length;
  const late = records.filter(r => r.status === '迟到').length;

  // Simulate new check-in
  const simulateCheckin = () => {
    const names = ['黄磊', '吴敏', '郑浩', '林佳', '何静'];
    const branches = ['南湾街道 南湾社区第一党支部', '南湾街道 康乐社区第二党支部', '南湾街道 丹竹头社区第三党支部'];

      name: names[Math.floor(Math.random() * names.length)],
      branch: branches[Math.floor(Math.random() * branches.length)],
      time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }),
      status: Math.random() > 0.7 ? '迟到' : '准时',
    };
    setRecords(prev => [newRecord, ...prev]);
    showPrototypeToast('已模拟扫码签到');
  };

  const scheduleSuggestClose = () => {
    if (suggestBlurTimer.current) window.clearTimeout(suggestBlurTimer.current);
    suggestBlurTimer.current = window.setTimeout(() => setSuggestOpen(false), 200);
  };
  const cancelSuggestClose = () => {
    if (suggestBlurTimer.current) window.clearTimeout(suggestBlurTimer.current);
  };

  const selectSuggestedMember = (m) => {
    setCommittedPick(m);
    setManualId(`${m.name} · ${m.memberNo}`);
    setSuggestOpen(false);
    showPrototypeToast(`已选择：${m.name}，可点击「手动补录」提交`);
  };

  const onManualInputChange = (e) => {
    setCommittedPick(null);
    setManualId(e.target.value);
    setSuggestOpen(true);
  };

  const handleManualCheckin = () => {
    if (manualBusy) return;
    const raw = manualId.trim();
    if (!raw && !committedPick) {
      setToast({ type: 'error', text: '请输入党员编号或姓名' });
      return;
    }

    let resolved = null;
    if (committedPick) {
      resolved = committedPick;
    } else {
      const idTry = raw.replace(/\s+/g, '').toUpperCase();
      if (partyMemberLookup[idTry]) {
        resolved = { memberNo: idTry, ...partyMemberLookup[idTry] };
      } else {
        const matches = matchPartyMembers(raw, partyMemberRoster);
        if (matches.length === 1) {
          resolved = matches[0];
        } else if (matches.length > 1) {
          setToast({ type: 'error', text: '匹配到多名党员，请从下拉列表中选择' });
          setSuggestOpen(true);
          return;
        } else {
          setToast({ type: 'error', text: '未找到该党员，请核对编号或姓名' });
          return;
        }
      }
    }

    const id = String(resolved.memberNo).toUpperCase();
    if (records.some(r => r.memberNo && String(r.memberNo).toUpperCase() === id)) {
      setToast({ type: 'error', text: '该党员已在本次活动中签到' });
      return;
    }

    const profile = { name: resolved.name, branch: resolved.branch };
    setManualBusy(true);
    window.setTimeout(() => {
      const status = checkinStatusFromActivityTime(activity);

        name: profile.name,
        branch: profile.branch,
        time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }),
        status,
        memberNo: id,
      };
      setRecords(prev => [newRecord, ...prev]);
      setManualId('');
      setCommittedPick(null);
      setManualBusy(false);
      setToast({ type: 'success', text: `${profile.name} 补录成功（${status}）` });
    }, 500);
  };

    <div>
      <div style={{ marginBottom: 20 }}>
        <span onClick={onBack} style={{ fontSize: 13, color: T.primary, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4, marginBottom: 8 }}>

          返回活动列表
        </span>
        <h2 style={{ fontSize: 20, fontWeight: 700, fontFamily: "'Noto Serif SC', serif" }}>现场扫码签到</h2>
        <p style={{ fontSize: 13, color: T.textMuted, marginTop: 4 }}>{activity.name} · {activity.date}</p>
      </div>

      {/* Stats */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16, marginBottom: 20 }}>
        {[
          { label: '应到人数', value: activity.count?.split('/')[1] || '0', color: T.textPrimary },
          { label: '实到人数', value: records.length, color: T.success },
          { label: '准时', value: onTime, color: T.success },
          { label: '迟到', value: late, color: T.warning },
        ].map((s, i) => (
          <div key={i} onClick={() => showPrototypeToast(`签到统计 · ${s.label}：${s.value}（演示）`)} style={{ background: T.surface, borderRadius: T.cardRadius, padding: '16px 20px', boxShadow: T.cardShadow, border: `1px solid ${T.border}`, textAlign: 'center', cursor: 'pointer' }}>
            <p style={{ fontSize: 12, color: T.textMuted, marginBottom: 6 }}>{s.label}</p>
            <p style={{ fontSize: 28, fontWeight: 700, color: s.color, fontFamily: "'Noto Serif SC', serif" }}>{s.value}</p>
          </div>
        ))}
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr', gap: 16 }}>
        {/* Check-in records */}
        <div style={{ background: T.surface, borderRadius: T.cardRadius, padding: 24, boxShadow: T.cardShadow, border: `1px solid ${T.border}` }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
            <h3 style={{ fontSize: 15, fontWeight: 600, fontFamily: "'Noto Serif SC', serif" }}>实时签到记录</h3>

function ActivityAudienceScopeFields({ preset }) {
  const org = getActiveStreetOrg();
  const street = org.street || '南湾街道';
  const comms = (org.communities && org.communities.length) ? org.communities : ['南湾社区', '康乐社区', '丹竹头社区'];
  const zhNum = ['一', '二', '三', '四', '五'];
  const demoBranches = comms.slice(0, 6).map((c, i) => `${street} ${c}第${zhNum[i % zhNum.length]}党支部`);

  const [scopeType, setScopeType] = React.useState(preset?.scopeType || 'branch');
  const [communityPick, setCommunityPick] = React.useState(preset?.communityPick || (comms[1] || comms[0]));
  const [branchPick, setBranchPick] = React.useState(preset?.branchPick || (demoBranches[1] || demoBranches[0]));
  const [multi, setMulti] = React.useState(() => {
    const init = {};
    demoBranches.slice(0, 4).forEach((b) => { init[b] = !!(preset?.multiOn && preset.multiOn[b]); });
    if (!Object.values(init).some(Boolean) && demoBranches[1]) init[demoBranches[1]] = true;
    return init;
  });

  const [excludedNames, setExcludedNames] = React.useState(() => (
    Array.isArray(preset?.excludedNames) && preset.excludedNames.length
      ? [...preset.excludedNames]
      : ['张伟', '李娜', '王强', '刘芳', '陈明']
  ));

  const [pickOpen, setPickOpen] = React.useState(false);
  const [pickQ, setPickQ] = React.useState('');
  const [pickBranch, setPickBranch] = React.useState('__all__');
  const [pickIdentity, setPickIdentity] = React.useState('__all__');
  const [pickSel, setPickSel] = React.useState({});

  const memberPool = membersAllForAiSearch;
  const branchOptions = React.useMemo(() => ['__all__', ...Array.from(new Set(memberPool.map((m) => m.branch).filter(Boolean)))], [memberPool]);

  const filteredMembers = React.useMemo(() => memberPool.filter((m) => {
    if (pickBranch !== '__all__' && m.branch !== pickBranch) return false;
    if (pickIdentity !== '__all__' && m.identity !== pickIdentity) return false;
    const q = pickQ.trim();
    if (q) {
      const n = m.name || '';
      const ph = String(m.phone || '').replace(/\*/g, '');
      const id = String(m.id || '');
      if (!n.includes(q) && !ph.includes(q) && !id.includes(q)) return false;
    }
    return true;
  }), [memberPool, pickBranch, pickIdentity, pickQ]);

  const openPicker = () => {
    setPickQ('');
    setPickBranch('__all__');
    setPickIdentity('__all__');
    setPickSel({});
    setPickOpen(true);
  };

  const confirmPicker = () => {
    const add = filteredMembers.filter((m) => pickSel[m.id]);
    if (!add.length) {
      showPrototypeToast('请先在列表中勾选要排除的人员', 'error');
      return;
    }
    setExcludedNames((prev) => {
      const s = new Set(prev);
      add.forEach((m) => s.add(m.name));
      return [...s];
    });
    setPickOpen(false);
    setPickSel({});
    showPrototypeToast(`已加入排除名单 ${add.length} 人（演示）`);
  };

  const toggleExcludedName = (name, on) => {
    setExcludedNames((arr) => (on ? (arr.includes(name) ? arr : [...arr, name]) : arr.filter((x) => x !== name)));
  };

  return (
    <div style={{ marginBottom: 18, padding: '14px 16px', background: T.bg, borderRadius: 10, border: `1px solid ${T.border}` }}>
      <label style={{ fontSize: 13, fontWeight: 600, color: T.textPrimary, display: 'block', marginBottom: 8 }}>
        参会范围 <span style={{ color: T.primary }}>*</span>
      </label>
      <p style={{ fontSize: 12, color: T.textMuted, lineHeight: 1.55, marginBottom: 12 }}>
        应到人数由系统在保存后按范围从「党员管理」在册人员自动汇总；可选填下方<strong>排除名单</strong>扣减（请假已批、因公外出等，正式环境可对接审批流）。
      </p>
      <SelectField style={{ width: '100%', marginBottom: 12 }} value={scopeType} onChange={(e) => setScopeType(e.target.value)}>
        <option value="street">整条街道（{street} · 当前数据域内在册党员）</option>
        <option value="community">单个社区（含该社区下各支部党员）</option>
        <option value="branch">单个支部</option>
        <option value="branches">多个支部（勾选）</option>
      </SelectField>
      {scopeType === 'community' && (
        <div style={{ marginBottom: 12 }}>
          <label style={{ fontSize: 12, fontWeight: 600, color: T.textSecondary, display: 'block', marginBottom: 6 }}>选择社区</label>
          <SelectField style={{ width: '100%' }} value={communityPick} onChange={(e) => setCommunityPick(e.target.value)}>
            {comms.map((c) => (
              <option key={c} value={c}>{street} · {c}</option>
            ))}
          </SelectField>
        </div>
      )}
      {scopeType === 'branch' && (
        <div style={{ marginBottom: 12 }}>
          <label style={{ fontSize: 12, fontWeight: 600, color: T.textSecondary, display: 'block', marginBottom: 6 }}>选择支部</label>
          <SelectField style={{ width: '100%' }} value={branchPick} onChange={(e) => setBranchPick(e.target.value)}>
            {demoBranches.map((b) => (
              <option key={b} value={b}>{b}</option>
            ))}
          </SelectField>
        </div>
      )}
      {scopeType === 'branches' && (
        <div style={{ marginBottom: 12 }}>
          <label style={{ fontSize: 12, fontWeight: 600, color: T.textSecondary, display: 'block', marginBottom: 8 }}>勾选参与的支部（多选）</label>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {demoBranches.slice(0, 4).map((b) => (
              <label key={b} style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, cursor: 'pointer' }}>
                <input type="checkbox" checked={!!multi[b]} onChange={() => setMulti((m) => ({ ...m, [b]: !m[b] }))} style={{ width: 16, height: 16 }} />
                <span>{b}</span>
              </label>
            ))}
          </div>
        </div>
      )}
      {scopeType === 'street' && (
        <p style={{ fontSize: 12, color: T.textSecondary, marginBottom: 12, lineHeight: 1.5 }}>
          已选：<strong>{org.district} · {street}</strong> 全辖区在册党员（演示：保存时由后端按组织树统计应到）。
        </p>
      )}

      <div style={{ borderTop: `1px dashed ${T.border}`, paddingTop: 14, marginTop: 4 }}>
        <label style={{ fontSize: 13, fontWeight: 600, color: T.textPrimary, display: 'block', marginBottom: 6 }}>
          排除人员（不计入应到）
        </label>
        <p style={{ fontSize: 12, color: T.textMuted, lineHeight: 1.55, marginBottom: 10 }}>以下人员不参加本场活动、不计入应到；可点「从党员管理添加」按姓名模糊搜、下拉筛选后多选加入。</p>
        {excludedNames.length === 0 ? (
          <p style={{ fontSize: 12, color: T.textMuted, marginBottom: 10 }}>暂无排除人员。</p>
        ) : (
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: '10px 16px', marginBottom: 10 }}>
            {excludedNames.map((n) => (
              <label key={n} style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 13, cursor: 'pointer' }}>
                <input type="checkbox" checked onChange={() => toggleExcludedName(n, false)} style={{ width: 16, height: 16 }} />
                <span>{n}</span>
              </label>
            ))}
          </div>
        )}
        <SecondaryBtn style={{ marginTop: 4 }} onClick={openPicker}>+ 从党员管理添加</SecondaryBtn>
      </div>

      {pickOpen && (
        <div
          role="dialog"
          aria-modal="true"
          style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', zIndex: 4000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16 }}
          onClick={() => setPickOpen(false)}
        >
          <div
            style={{ background: T.surface, borderRadius: 14, width: 'min(440px, 94vw)', maxHeight: 'min(520px, 88vh)', overflow: 'hidden', display: 'flex', flexDirection: 'column', boxShadow: '0 16px 48px rgba(0,0,0,0.18)', border: `1px solid ${T.border}` }}
            onClick={(e) => e.stopPropagation()}
          >
            <div style={{ padding: '14px 16px', borderBottom: `1px solid ${T.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <h3 style={{ fontSize: 16, fontWeight: 700, margin: 0, fontFamily: "'Noto Serif SC', serif" }}>从党员管理添加</h3>
              <button type="button" onClick={() => setPickOpen(false)} style={{ border: 'none', background: 'none', fontSize: 22, cursor: 'pointer', color: T.textMuted, lineHeight: 1 }} aria-label="关闭">×</button>
            </div>
            <div style={{ padding: '12px 16px', borderBottom: `1px solid ${T.border}`, display: 'flex', flexDirection: 'column', gap: 10 }}>
              <InputField placeholder="姓名 / 编号 / 手机号片段（模糊）" value={pickQ} onChange={(e) => setPickQ(e.target.value)} style={{ width: '100%' }} />
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                <div>
                  <label style={{ fontSize: 11, fontWeight: 600, color: T.textMuted, display: 'block', marginBottom: 4 }}>所属支部</label>
                  <SelectField style={{ width: '100%' }} value={pickBranch} onChange={(e) => setPickBranch(e.target.value)}>
                    <option value="__all__">全部支部</option>
                    {branchOptions.filter((b) => b !== '__all__').map((b) => (
                      <option key={b} value={b}>{b.length > 22 ? `${b.slice(0, 20)}…` : b}</option>
                    ))}
                  </SelectField>
                </div>
                <div>
                  <label style={{ fontSize: 11, fontWeight: 600, color: T.textMuted, display: 'block', marginBottom: 4 }}>系统身份</label>
                  <SelectField style={{ width: '100%' }} value={pickIdentity} onChange={(e) => setPickIdentity(e.target.value)}>
                    <option value="__all__">全部身份</option>
                    {PC_SYSTEM_IDENTITIES.map((it) => (
                      <option key={it.key} value={it.key}>{it.label}</option>
                    ))}
                  </SelectField>
                </div>
              </div>
            </div>
            <div style={{ flex: 1, overflowY: 'auto', padding: '8px 12px' }}>
              <p style={{ fontSize: 11, color: T.textMuted, margin: '4px 4px 8px' }}>共 {filteredMembers.length} 条 · 勾选后加入排除名单（已在名单的置灰）</p>
              {filteredMembers.map((m) => {
                const inList = excludedNames.includes(m.name);
                return (
                  <label
                    key={m.id}
                    style={{
                      display: 'flex', alignItems: 'flex-start', gap: 10, padding: '10px 8px', borderRadius: 8, cursor: inList ? 'default' : 'pointer',
                      opacity: inList ? 0.45 : 1, background: pickSel[m.id] ? T.primaryLight : 'transparent', marginBottom: 2,
                    }}
                  >
                    <input
                      type="checkbox"
                      disabled={inList}
                      checked={inList || !!pickSel[m.id]}
                      onChange={() => { if (!inList) setPickSel((s) => ({ ...s, [m.id]: !s[m.id] })); }}
                      style={{ width: 16, height: 16, marginTop: 2, flexShrink: 0 }}
                    />
                    <span style={{ flex: 1, minWidth: 0 }}>
                      <span style={{ fontSize: 13, fontWeight: 600, color: T.textPrimary }}>{m.name}</span>
                      <span style={{ fontSize: 11, color: T.textMuted, display: 'block', marginTop: 2 }}>{m.branch}</span>
                      <span style={{ fontSize: 11, color: '#0F766E' }}>{pcIdentityLabel(m.identity)}</span>
                      {inList && <span style={{ fontSize: 10, color: T.warning, marginLeft: 6 }}>已在排除名单</span>}
                    </span>
                  </label>
                );
              })}
              {filteredMembers.length === 0 && (
                <p style={{ fontSize: 13, color: T.textMuted, textAlign: 'center', padding: '24px 8px' }}>无匹配人员，请调整搜索或筛选条件</p>
              )}
            </div>
            <div style={{ padding: '12px 16px', borderTop: `1px solid ${T.border}`, display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
              <SecondaryBtn onClick={() => setPickOpen(false)}>取消</SecondaryBtn>
              <PrimaryBtn onClick={confirmPicker}>确定加入</PrimaryBtn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ActivitiesPage({ initialSub, onSubChange }) {
  const [subPage, setSubPage] = React.useState(initialSub || 'list');
  const [selectedActivity, setSelectedActivity] = React.useState(null);

  React.useEffect(() => {
    if (initialSub && initialSub !== 'list') {
      setSubPage(initialSub);
      onSubChange('list');
    }
  }, [initialSub, onSubChange]);

  if (subPage === 'create') {
    return (
      <div>
        <span onClick={() => setSubPage('list')} style={{ fontSize: 13, color: T.primary, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4, marginBottom: 8 }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M15 18l-6-6 6-6"/></svg>
          返回列表
        </span>
        <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 20, fontFamily: "'Noto Serif SC', serif" }}>创建/编辑活动</h2>
        <div style={{ background: T.surface, borderRadius: T.cardRadius, padding: 24, boxShadow: T.cardShadow, border: `1px solid ${T.border}`, maxWidth: 700 }}>
          {[
            { label: '活动类型', type: 'select', options: ['组织生活', '志愿服务', '主题党日', '民主评议', '培训学习'] },
            { label: '活动名称', type: 'input', placeholder: '请输入活动名称' },
            { label: '活动时间', type: 'datetime' },
            { label: '活动地点', type: 'input', placeholder: '请输入活动地点' },
          ].map((field, i) => (
            <div key={i} style={{ marginBottom: 18 }}>
              <label style={{ fontSize: 13, fontWeight: 600, color: T.textPrimary, display: 'block', marginBottom: 6 }}>
                {field.label} <span style={{ color: T.primary }}>*</span>
              </label>
              {field.type === 'select' ? (
                <SelectField style={{ width: '100%' }}>{field.options.map(o => <option key={o}>{o}</option>)}</SelectField>
              ) : (
                <InputField type={field.type === 'datetime' ? 'datetime-local' : 'text'} placeholder={field.placeholder} style={{ width: '100%' }} />
              )}
            </div>
          ))}
          <ActivityAudienceScopeFields />
          <div style={{ marginBottom: 18 }}>
            <label style={{ fontSize: 13, fontWeight: 600, color: T.textPrimary, display: 'block', marginBottom: 6 }}>
              签到规则 <span style={{ color: T.primary }}>*</span>
            </label>
            <SelectField style={{ width: '100%' }}>
              <option>活动开始前15分钟开放</option>
              <option>活动当天开放</option>
              <option>手动签到</option>
            </SelectField>
          </div>
          <div style={{ marginBottom: 18 }}>
            <label style={{ fontSize: 13, fontWeight: 600, color: T.textPrimary, display: 'block', marginBottom: 6 }}>活动照片</label>
            <div style={{ border: `2px dashed ${T.border}`, borderRadius: 10, padding: '30px 0', textAlign: 'center', background: T.bg, cursor: 'pointer' }} onClick={() => showPrototypeToast('请选择活动照片（演示）')}>
              <div style={{ color: T.textMuted, marginBottom: 8, display: 'flex', justifyContent: 'center' }}><I.Camera /></div>
              <p style={{ fontSize: 13, color: T.textMuted }}>点击或拖拽上传活动照片</p>
              <p style={{ fontSize: 12, color: T.textMuted, marginTop: 2 }}>支持 JPG/PNG，单张不超过5MB</p>
            </div>
          </div>
          <div style={{ display: 'flex', gap: 10 }}>
            <PrimaryBtn style={{ flex: 1 }} onClick={() => { showPrototypeToast('活动已保存并发布（演示）'); setSubPage('list'); }}>保存并发布</PrimaryBtn>
            <SecondaryBtn style={{ flex: 1 }} onClick={() => showPrototypeToast('已保存为草稿（演示）')}>保存草稿</SecondaryBtn>
          </div>
        </div>
      </div>
    );
  }

  if (subPage === 'edit' && selectedActivity) {
    const act = activitiesData.find(a => a.id === selectedActivity);
    return (
      <div>
        <span onClick={() => { setSubPage('list'); setSelectedActivity(null); }} style={{ fontSize: 13, color: T.primary, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4, marginBottom: 8 }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M15 18l-6-6 6-6"/></svg>
          返回列表
        </span>
        <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 20, fontFamily: "'Noto Serif SC', serif" }}>编辑活动</h2>
        <div style={{ background: T.surface, borderRadius: T.cardRadius, padding: 24, boxShadow: T.cardShadow, border: `1px solid ${T.border}`, maxWidth: 700 }}>
          {[
            { label: '活动类型', type: 'select', options: ['组织生活', '志愿服务', '主题党日', '民主评议', '培训学习'], value: act?.type },
            { label: '活动名称', type: 'input', placeholder: '请输入活动名称', value: act?.name },
            { label: '活动时间', type: 'datetime', value: act?.date },
            { label: '活动地点', type: 'input', placeholder: '请输入活动地点', value: act?.location },
          ].map((field, i) => (
            <div key={i} style={{ marginBottom: 18 }}>
              <label style={{ fontSize: 13, fontWeight: 600, color: T.textPrimary, display: 'block', marginBottom: 6 }}>
                {field.label} <span style={{ color: T.primary }}>*</span>
              </label>
              {field.type === 'select' ? (
                <SelectField style={{ width: '100%' }} defaultValue={field.value}>{field.options.map(o => <option key={o}>{o}</option>)}</SelectField>
              ) : (
                <InputField type={field.type === 'datetime' ? 'datetime-local' : 'text'} placeholder={field.placeholder} defaultValue={field.value} style={{ width: '100%' }} />
              )}
            </div>
          ))}
          <ActivityAudienceScopeFields
            key={act?.id || 'edit'}
            preset={{
              scopeType: act?.audienceScope || 'branch',
              communityPick: act?.audienceCommunity,
              branchPick: act?.audienceBranch || undefined,
            }}
          />
          <div style={{ marginBottom: 18 }}>
            <label style={{ fontSize: 13, fontWeight: 600, color: T.textPrimary, display: 'block', marginBottom: 6 }}>
              签到规则 <span style={{ color: T.primary }}>*</span>
            </label>
            <SelectField style={{ width: '100%' }} defaultValue={act?.checkinRule || '活动开始前15分钟开放'}>
              <option>活动开始前15分钟开放</option>
              <option>活动当天开放</option>
              <option>手动签到</option>
            </SelectField>
          </div>
          <div style={{ marginBottom: 18 }}>
            <label style={{ fontSize: 13, fontWeight: 600, color: T.textPrimary, display: 'block', marginBottom: 6 }}>活动照片</label>
            <div style={{ border: `2px dashed ${T.border}`, borderRadius: 10, padding: '30px 0', textAlign: 'center', background: T.bg, cursor: 'pointer' }} onClick={() => showPrototypeToast('请选择活动照片（演示）')}>
              <div style={{ color: T.textMuted, marginBottom: 8, display: 'flex', justifyContent: 'center' }}><I.Camera /></div>
              <p style={{ fontSize: 13, color: T.textMuted }}>点击或拖拽上传活动照片</p>
              <p style={{ fontSize: 12, color: T.textMuted, marginTop: 2 }}>支持 JPG/PNG，单张不超过5MB</p>
            </div>
          </div>
          <div style={{ display: 'flex', gap: 10 }}>
            <PrimaryBtn style={{ flex: 1 }} onClick={() => { showPrototypeToast('活动信息已更新（演示）'); setSubPage('list'); setSelectedActivity(null); }}>保存修改</PrimaryBtn>
            <SecondaryBtn style={{ flex: 1 }} onClick={() => { setSubPage('list'); setSelectedActivity(null); }}>取消</SecondaryBtn>
          </div>
        </div>
      </div>
    );
  }

  if (subPage === 'photos') {
    const act = activitiesData.find(a => a.id === selectedActivity) || activitiesData[0];
    return <ActivityPhotosPage activity={act} onBack={() => { setSubPage('list'); setSelectedActivity(null); }} />;
  }

  if (subPage === 'checkin') {
    const act = activitiesData.find(a => a.id === selectedActivity) || activitiesData[0];
    return <CheckinManagePage activity={act} onBack={() => { setSubPage('list'); setSelectedActivity(null); }} />;
  }

  return (
    <div>
      <PageHeader
        title="活动管理"
        subtitle="新建/编辑时可选择整条街道、单个社区、单支部或多支部作为参会范围，并指定排除人员（不计入应到）。与小程序现场签到应到统计口径一致（演示）。"
        actions={<PrimaryBtn onClick={() => setSubPage('create')}><I.Plus /> 新建活动</PrimaryBtn>}
      />
      <FilterBar>
        <SelectField onChange={() => showPrototypeToast('筛选：活动类型已更新（演示）')}><option>全部类型</option><option>组织生活</option><option>志愿服务</option><option>主题党日</option></SelectField>
        <SelectField onChange={() => showPrototypeToast('筛选：活动状态已更新（演示）')}><option>全部状态</option><option>未开始</option><option>进行中</option><option>已结束</option></SelectField>
        <SecondaryBtn onClick={() => showPrototypeToast('活动列表已刷新（演示）')}>查询</SecondaryBtn>
      </FilterBar>
      <DataTable columns={['活动名称', '类型', '时间', '地点', '报名人数', '状态', '操作']} actions rows={activitiesData.map((a, i) => (
        <tr key={i} style={{ borderBottom: `1px solid ${T.border}`, background: '#fff' }}>
          <td style={{ padding: '12px 16px', fontSize: 13, fontWeight: 500 }}>{a.name}</td>
          <td style={{ padding: '12px 16px', fontSize: 13, color: T.textSecondary }}>{a.type}</td>
          <td style={{ padding: '12px 16px', fontSize: 13 }}>{a.date.split(' ')[0]}</td>
          <td style={{ padding: '12px 16px', fontSize: 13, color: T.textSecondary }}>{a.location}</td>
          <td style={{ padding: '12px 16px', fontSize: 13 }}>{a.count}</td>
          <td style={{ padding: '12px 16px' }}><Badge color={a.statusColor} bg={`${a.statusColor}12`}>{a.status}</Badge></td>
          <td style={{ padding: '12px 16px', display: 'flex', gap: 12 }}>
            <span style={{ color: T.primary, cursor: 'pointer', fontSize: 13, display: 'flex', alignItems: 'center', gap: 3 }} onClick={() => { showPrototypeToast(`编辑活动：${a.name}`); setSelectedActivity(a.id); setSubPage('edit'); }}><I.Edit /> 编辑</span>
            <span style={{ color: '#2563EB', cursor: 'pointer', fontSize: 13, display: 'flex', alignItems: 'center', gap: 3 }} onClick={() => { showPrototypeToast(`签到管理：${a.name}`); setSelectedActivity(a.id); setSubPage('checkin'); }}><I.Users /> 签到管理</span>

function CoursesPage() {
  const [courses, setCourses] = React.useState(initialCoursesRows);

  const [statsOpen, setStatsOpen] = React.useState(false);
  const [editId, setEditId] = React.useState(null);
  const [form, setForm] = React.useState({ name: '', type: '视频', required: '必修', duration: '30分钟' });
  /** 上传弹窗内按类型的演示素材状态 */
  const [uploadDraft, setUploadDraft] = React.useState({
    videoName: '', videoSize: '', coverName: '', audioName: '', articleBody: '', articleImgCount: 0,
  });

  const resetUploadDraft = () => setUploadDraft({
    videoName: '', videoSize: '', coverName: '', audioName: '', articleBody: '', articleImgCount: 0,
  });

  const openUploadModal = () => {
    setForm({ name: '', type: '视频', required: '必修', duration: '30分钟' });
    resetUploadDraft();
    setUploadOpen(true);
  };

  const submitUpload = () => {
    if (!form.name.trim()) {
      showPrototypeToast('请填写课程名称', 'error');
      return;
    }
    if (form.type === '视频' && !uploadDraft.videoName) {
      showPrototypeToast('请先点击上传区选择视频文件（演示）', 'error');
      return;
    }
    if (form.type === '音频' && !uploadDraft.audioName) {
      showPrototypeToast('请先点击上传区选择音频文件（演示）', 'error');
      return;
    }
    if (form.type === '图文' && !uploadDraft.articleBody.trim() && uploadDraft.articleImgCount === 0) {
      showPrototypeToast('图文课请填写正文或上传至少一张配图（演示）', 'error');
      return;
    }
    const id = 'c' + Date.now();
    setCourses(prev => [...prev, { id, name: form.name.trim(), type: form.type, required: form.required, duration: form.duration || '30分钟', learners: 0, rate: 0 }]);
    setUploadOpen(false);
    setForm({ name: '', type: '视频', required: '必修', duration: '30分钟' });
    resetUploadDraft();
    showPrototypeToast('课程已上传（演示）');
  };

  const saveEdit = () => {
    if (!editId || !form.name.trim()) {
      showPrototypeToast('请填写课程名称', 'error');
      return;
    }
    setCourses(prev => prev.map(c => (c.id === editId ? { ...c, ...form, name: form.name.trim() } : c)));
    setEditId(null);
    showPrototypeToast('课程信息已保存（演示）');

  const removeCourse = (id, name) => {
    if (!window.confirm(`确定删除课程「${name}」？（演示）`)) return;

    showPrototypeToast('已删除该课程（演示）');
  };

  return (
    <div>
      <PageHeader
        title="课程与往期"
        subtitle="对齐小程序「学习」：一级平台外链由「学习 → 学习外链配置」写入本机；学员端直播卡片由「学习 → 直播管理」写入并同步 C 端；往期课程列表与学员「已学/未学」由本模块课程与统计驱动（正式对接 API 后同步）。"
        actions={<>
        <PrimaryBtn onClick={openUploadModal}><I.Upload /> 上传课程</PrimaryBtn>
        <SecondaryBtn onClick={() => { setUploadOpen(false); setStatsOpen(true); showPrototypeToast('已打开观看统计'); }}><I.Chart /> 观看统计</SecondaryBtn>
      </>} />

      {statsOpen && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1100 }} onClick={() => setStatsOpen(false)}>

              <button type="button" onClick={() => setStatsOpen(false)} style={{ background: 'none', border: 'none', fontSize: 22, cursor: 'pointer', color: T.textMuted, lineHeight: 1 }} aria-label="关闭">×</button>

function formatLivePromoRangeCell(s) {
  const a = (s.promoStartAt || '').trim();
  const b = (s.promoEndAt || '').trim();
  if (!a && !b) return '不限';
  const fmt = (iso) => {
    if (!iso) return '—';
    const d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    const p = (n) => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
  };
  return `${fmt(a)} ~ ${fmt(b)}`;
}

function sessionToManageRow(s) {

/** 去掉「日期：」「讲师：」等行首标签，便于拼通知正文 */
function stripLeadingFieldLabel(text, labels) {
  const t = (text || '').trim();
  for (let i = 0; i < labels.length; i++) {
    const lab = labels[i];
    if (t.startsWith(lab)) return t.slice(lab.length).trim();
  }
  return t;
}

/** 参考群通知常用结构：时间场次 + 观看链接密码 + 保密 + 社区组织 */
function buildLiveAnnouncementText(row) {
  const datePart = stripLeadingFieldLabel(row.dateLine || row.date, ['日期：', '日期:']) || (row.date || '—').trim();
  const lecturerPart = stripLeadingFieldLabel(row.lecturerLine || row.teacher, ['讲师：', '讲师:']) || (row.teacher || '—').trim();
  const themeRaw = (row.themeLine || '').trim();
  const topic = stripLeadingFieldLabel(themeRaw, ['主题：', '主题:']) || themeRaw || '专题讲座';
  const cardShort = (row.cardTitle || '').replace(/^海报[:：]\s*/i, '').trim() || (row.tagLine || '').trim() || '本期直播';
  const url = (row.entryUrl || row.liveLink || '').trim();
  const pwd = (row.password || '').trim();
  const line1 = `定于${datePart}，开设「${cardShort}」，邀请${lecturerPart}作题为《${topic}》的专题讲座。`;
  const line2 = url
    ? `浏览器打开${url}，密码:${pwd || '（见群内通知）'}。`
    : `观看链接待配置，密码:${pwd || '—'}。`;
  const line3 = '联动授课期间，请严格注意保密，不得对培训内容进行录音、拍照、摄像，不得通过互联网、手机等发布培训有关信息。';
  const line4 = '各社区按需组织，并将人数和观看照片直接发群。谢谢';
  return [line1, '', line2, '', line3, '', line4].join('\n');
}

function posterDownloadFilename(id) {
  const safe = String(id || 'poster').replace(/[^\w\u4e00-\u9fa5-]+/g, '_').slice(0, 48);
  return `宣传图_${safe || 'live'}`;
}

function posterDownloadExt(src) {
  if (/^data:image\/png/i.test(src)) return 'png';
  if (/^data:image\/jpe?g/i.test(src)) return 'jpg';
  if (/^data:image\/webp/i.test(src)) return 'webp';
  if (/^data:image\/gif/i.test(src)) return 'gif';
  return 'png';
}

function downloadLiveSessionPoster(row) {
  const src = (row.posterImage || '').trim();
  if (!src) {
    showPrototypeToast('请先在「编辑活动信息」中上传宣传图后再下载', 'error');
    return;
  }
  const name = `${posterDownloadFilename(row.id)}.${posterDownloadExt(src)}`;
  const a = document.createElement('a');
  a.href = src;
  a.download = name;
  a.rel = 'noopener';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  if (/^https?:\/\//i.test(src)) {
    showPrototypeToast('已尝试下载；若外链受浏览器策略限制，请右键图片另存为', 'success');
  } else {
    showPrototypeToast('宣传图已开始下载', 'success');
  }
}

function copyLiveAnnouncementText(row) {
  const text = buildLiveAnnouncementText(row);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showPrototypeToast('通知文案已复制到剪贴板')).catch(() => showPrototypeToast('复制失败，请手动全选复制', 'error'));
  } else {
    showPrototypeToast('当前环境不支持剪贴板，请手动复制控制台生成的文案', 'error');
  }
}

// ============================================
// Page: Live（运营列表 = liveSessions，与小程序同键 nw_learning_runtime_config_v1）
// ============================================
function LivePage({ adminOrgKey }) {
  const [subPage, setSubPage] = React.useState('list');
  const [selectedLive, setSelectedLive] = React.useState(null);
  const [liveSessions, setLiveSessions] = React.useState(() => readNwLearningRuntimeMerged().liveSessions);
  const [liveActivityModal, setLiveActivityModal] = React.useState({ open: false, mode: 'create', editIndex: null });
  const [draftSession, setDraftSession] = React.useState(() => ({ ...defaultLiveSession(0), id: 'ls_1' }));
  const [manageLive, setManageLive] = React.useState(null);
  const [manageLiveIndex, setManageLiveIndex] = React.useState(null);
  const [manageSubView, setManageSubView] = React.useState(null);
  const [replayFileName, setReplayFileName] = React.useState('');

  React.useEffect(() => {
    const pull = () => setLiveSessions(readNwLearningRuntimeMerged().liveSessions);
    window.addEventListener('storage', pull);
    window.addEventListener('focus', pull);
    const onOrg = () => pull();
    window.addEventListener('nw-admin-org-changed', onOrg);
    let bc;
    if (typeof BroadcastChannel !== 'undefined') {
      bc = new BroadcastChannel(getNwLearningRuntimeBC());
      bc.onmessage = pull;
    }
    return () => {
      window.removeEventListener('storage', pull);
      window.removeEventListener('focus', pull);
      window.removeEventListener('nw-admin-org-changed', onOrg);
      if (bc) try { bc.close(); } catch (e) {}
    };
  }, [adminOrgKey]);

  const closeManageConsole = () => {
    setManageSubView(null);
    setManageLive(null);
    setManageLiveIndex(null);
    setReplayFileName('');
  };

  const openLiveActivityModal = (mode, editIndex = null) => {
    const list = readNwLearningRuntimeMerged().liveSessions;
    if (mode === 'edit' && editIndex != null && list[editIndex]) {
      setLiveActivityModal({ open: true, mode: 'edit', editIndex });
      setDraftSession(JSON.parse(JSON.stringify(list[editIndex])));
    } else {
      setLiveActivityModal({ open: true, mode: 'create', editIndex: null });
      setDraftSession({ ...defaultLiveSession(list.length), id: generateLiveSessionId(list) });
    }
  };

  const closeLiveActivityModal = () => {
    setLiveActivityModal({ open: false, mode: 'create', editIndex: null });
  };

  const patchDraftSession = (patch) => {
    setDraftSession((d) => ({ ...d, ...patch }));
  };

  const reorderLiveSessions = (index, delta) => {
    const full = readNwLearningRuntimeMerged();
    const list = full.liveSessions || [];
    const j = index + delta;
    if (j < 0 || j >= list.length) return;
    const next = [...list];
    const tmp = next[index];
    next[index] = next[j];
    next[j] = tmp;
    const ordered = normalizeLiveSessionsOrder(next);
    persistNwLearningRuntime({ ...full, liveSessions: ordered });
    setLiveSessions(ordered);
    if (manageLiveIndex === index) setManageLiveIndex(j);
    else if (manageLiveIndex === j) setManageLiveIndex(index);
    showPrototypeToast('场次排序已更新（演示）');
  };

  const submitLiveActivity = () => {
    const url = (draftSession.entryUrl || '').trim();
    if (!url) {
      showPrototypeToast('请填写观看页 URL', 'error');
      return;
    }
    if (!/^https?:\/\//i.test(url)) {
      showPrototypeToast('观看页 URL 需以 http:// 或 https:// 开头（演示）', 'error');
      return;
    }
    const full = readNwLearningRuntimeMerged();
    const list = full.liveSessions || [];
    const { mode, editIndex } = liveActivityModal;
    const idTrim = mode === 'edit' && editIndex != null && list[editIndex]
      ? String(list[editIndex].id)
      : generateLiveSessionId(list);
    const sortOrderResolved = (() => {
      const n = Number(draftSession.sortOrder);
      if (Number.isFinite(n)) return n;
      if (mode === 'edit' && editIndex != null && list[editIndex]) {
        const m = Number(list[editIndex].sortOrder);
        if (Number.isFinite(m)) return m;
      }
      return list.length;
    })();
    const normalized = {
      id: idTrim,
      tagLine: (draftSession.tagLine || '').trim(),
      posterTitle: (draftSession.posterTitle || '').trim(),
      posterName: (draftSession.posterName || '').trim(),
      cardTitle: (draftSession.cardTitle || '').trim(),
      themeLine: (draftSession.themeLine || '').trim(),
      lecturerLine: (draftSession.lecturerLine || '').trim(),
      dateLine: (draftSession.dateLine || '').trim(),
      entryUrl: url,
      password: (draftSession.password || '').trim(),
      posterImage: draftSession.posterImage ? String(draftSession.posterImage) : '',
      reg: draftSession.reg != null ? Number(draftSession.reg) : 0,
      attend: draftSession.attend != null ? draftSession.attend : '—',
      replay: draftSession.replay != null ? String(draftSession.replay) : '—',
      status: draftSession.status || '未开始',
      promoStartAt: (draftSession.promoStartAt || '').trim(),
      promoEndAt: (draftSession.promoEndAt || '').trim(),
      sortOrder: sortOrderResolved,
    };
    const ps = normalized.promoStartAt;
    const pe = normalized.promoEndAt;
    if (ps && pe) {
      const ts = new Date(ps).getTime();
      const te = new Date(pe).getTime();
      if (!isNaN(ts) && !isNaN(te) && ts > te) {
        showPrototypeToast('宣传结束时间须晚于或等于开始时间', 'error');
        return;
      }
    }
