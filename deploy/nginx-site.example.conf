# 阿里云轻量：复制到 /etc/nginx/conf.d/nw-party.conf（或 sites-available 再 ln -s）
# 将 server_name、root 改成你的域名与克隆目录；certbot 可后续补 SSL。
#
# root 指向仓库根目录（含 index.html、pc-admin/、prototype/）

server {
    listen 80;
    server_name your-domain.com;   # 或 _ 占位默认主机

    root /var/www/nw-party-prototype;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # 静态 Babel 原型无需缓存 HTML；可按需打开长缓存给图片等
    location ~* \.(html)$ {
        add_header Cache-Control "no-store";
    }
}
