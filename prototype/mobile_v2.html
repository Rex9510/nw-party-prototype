function readILongGangSchemePathOverride() {
  try {
    var v = localStorage.getItem(NW_ILG_SCHEME_PATH_OVERRIDE_KEY);
    if (v != null && String(v).trim()) return String(v).trim();
  } catch (e0) {}
  return '';
}

function resolveILongGangPlaintextPath(requestedPath) {
  var o = readILongGangSchemePathOverride();
  return o || (requestedPath != null ? String(requestedPath).trim() : '');
}

/** 明文 Scheme：appid + path + env_version（与微信文档一致；env 在微信外打开时生效） */
function buildWxMiniProgramPlaintextScheme(appid, path) {
  var aid = appid != null ? String(appid).trim() : '';
  var p = path != null ? String(path).trim() : '';
  if (!aid || !p) return '';
  return (
    'weixin://dl/business/?appid=' +
    encodeURIComponent(aid) +
    '&path=' +
    encodeURIComponent(p) +
    '&env_version=' +
    encodeURIComponent('release')
  );
}

function isWeChatInAppBrowser() {
  return /micromessenger/i.test(String(navigator.userAgent || ''));

function handleLifeServiceEntryClick(block) {
  if (!block || !block.kind) return;
  if (block.kind === 'h5' && block.href) {
    try {
      window.location.href = String(block.href).trim();
    } catch (eH5) {}
    return;
  }
  if (block.kind === 'miniprogram' && block.mpPath) {
    openILongGangMiniProgramAtPath(String(block.mpPath).trim());
  }
}

/** 仅允许明文 weixin:// 打开链（本页不再使用 wxaurl 加密链、短链、开放标签等） */
function isWechatExternalOpenLink(s) {
  if (!s || typeof s !== 'string') return false;
  return /^weixin:\/\//i.test(s.trim());
}

function tryNavigateWechatExternalOpen(s) {
  if (!isWechatExternalOpenLink(s)) return false;
  var u = String(s).trim();
  try {
    window.location.href = u;
    return true;
  } catch (eNav) {}
  try {
    if (window.top && window.top !== window) {
      window.top.location.href = u;
      return true;
    }
  } catch (eTop) {}
  return false;
}

/** 打开 i龙岗指定原生页：明文 Scheme（含 env_version=release） */
function openILongGangMiniProgramAtPath(mpPath) {
  var pathForScheme = resolveILongGangPlaintextPath(mpPath);
  if (!pathForScheme) {
    window.alert('小程序 path 为空，无法拼接打开链。');
    return;
  }
  var plain = buildWxMiniProgramPlaintextScheme(WX_ILG_MINIPROGRAM_APPID, pathForScheme);
  if (!plain) {
    window.alert('无法生成打开链（请检查 AppId 与 path）。');
    return;
  }
  tryNavigateWechatExternalOpen(plain);
}

/**
 * 头像大图预览：支持 data URL / https 图片；无图时展示姓氏字。
 * opts: { imageSrc?: string, letter?: string, caption?: string, hint?: string }
 */
function showNwAvatarLightbox(opts) {
  opts = opts || {};
  var imageSrc = typeof opts.imageSrc === 'string' ? opts.imageSrc.trim() : '';
  var letterRaw = typeof opts.letter === 'string' ? opts.letter.trim() : '';
  var letter = letterRaw ? letterRaw.charAt(0) : '?';
  var caption = typeof opts.caption === 'string' ? opts.caption.trim() : '';
  var hint = opts.hint || '轻触空白处、右上角 × 或「关闭」退出';
  var id = 'nw-avatar-lightbox-root';
  var old = document.getElementById(id);
  if (old) try { old.remove(); } catch (e0) {}

  function close() {
    try {
      document.removeEventListener('keydown', onKey);
    } catch (e1) {}
    try {
      el.remove();
    } catch (e2) {}
  }
  function onKey(e) {
    if (e.key === 'Escape') close();
  }

  var el = document.createElement('div');
  el.id = id;
  el.setAttribute('role', 'dialog');
  el.setAttribute('aria-modal', 'true');
  el.setAttribute('aria-label', '头像预览');
  el.style.cssText =
    'position:fixed;inset:0;z-index:10002;background:rgba(0,0,0,0.88);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;box-sizing:border-box;-webkit-tap-highlight-color:transparent';
  el.addEventListener('click', function (e) {
    if (e.target === el) close();
  });

  var xbtn = document.createElement('button');
  xbtn.type = 'button';
  xbtn.setAttribute('aria-label', '关闭');
  xbtn.textContent = '×';
  xbtn.style.cssText =
    'position:fixed;top:12px;right:12px;width:44px;height:44px;border-radius:50%;border:none;background:rgba(255,255,255,0.14);color:#fff;font-size:26px;line-height:1;cursor:pointer;z-index:10003';
  xbtn.onclick = function (e) {
    e.stopPropagation();
    close();
  };

  var panel = document.createElement('div');
  panel.style.cssText =
    'max-width:100%;max-height:86vh;display:flex;flex-direction:column;align-items:center;gap:12px;pointer-events:none';
  panel.addEventListener('click', function (e) {
    e.stopPropagation();
  });

  var size = Math.min(Math.floor(window.innerWidth * 0.78), 320);
  var hasImg = imageSrc && (imageSrc.indexOf('data:image') === 0 || /^https?:\/\//i.test(imageSrc));

  if (hasImg) {
    var img = document.createElement('img');
    img.src = imageSrc;
    img.alt = caption || '头像';
    img.style.cssText =
      'width:' +
      size +
      'px;height:' +
      size +
      'px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,0.22);box-shadow:0 12px 48px rgba(0,0,0,0.45);pointer-events:auto';
    panel.appendChild(img);
  } else {
    var fs = Math.max(40, Math.floor(size * 0.38));
    var circle = document.createElement('div');
    circle.textContent = letter;
    circle.style.cssText =
      'width:' +
      size +
      'px;height:' +
      size +
      'px;border-radius:50%;background:linear-gradient(160deg,#FFF0EE,#D44040);display:flex;align-items:center;justify-content:center;font-size:' +
      fs +
      'px;font-weight:700;color:#fff;font-family:Noto Serif SC,serif;border:3px solid rgba(255,255,255,0.25);box-sizing:border-box;pointer-events:auto';
    panel.appendChild(circle);
  }

  if (caption) {
    var cap = document.createElement('div');
    cap.textContent = caption;
    cap.style.cssText = 'color:#fff;font-size:16px;font-weight:600;text-align:center;max-width:92vw;pointer-events:auto';
    panel.appendChild(cap);
  }
  var hi = document.createElement('div');
  hi.textContent = hint;
  hi.style.cssText = 'color:rgba(255,255,255,0.55);font-size:12px;text-align:center;max-width:280px;line-height:1.5;pointer-events:auto';
  panel.appendChild(hi);

  var btn = document.createElement('button');
  btn.type = 'button';
  btn.textContent = '关闭';
  btn.style.cssText =
    'margin-top:4px;padding:11px 36px;border-radius:999px;border:1px solid rgba(255,255,255,0.35);background:rgba(255,255,255,0.12);color:#fff;font-size:14px;font-weight:600;cursor:pointer;pointer-events:auto';
  btn.onclick = function (e) {
    e.stopPropagation();
    close();
  };
  panel.appendChild(btn);

  el.appendChild(panel);
  el.appendChild(xbtn);
  document.body.appendChild(el);
  document.addEventListener('keydown', onKey);
}

function normalizeLiveSessionsOrder(sessions) {
  if (!Array.isArray(sessions) || sessions.length === 0) return [];
  var arr = sessions.map(function (s, i) {
    var o = Object.assign({}, s, { _orig: i });
    return o;
  });
  arr.sort(function (a, b) {
    var ao = Number(a.sortOrder);
    var bo = Number(b.sortOrder);
    var av = Number.isFinite(ao) ? ao : a._orig;
    var bv = Number.isFinite(bo) ? bo : b._orig;
    if (av !== bv) return av - bv;
    return a._orig - b._orig;
  });
  return arr.map(function (s, i) {
    var out = Object.assign({}, s);
    delete out._orig;
    out.sortOrder = i;
    return out;
  });
}

function normalizeLearningRuntimeObj(o) {
  var base = nwLearningRuntimeDefaults();
  var platformLinks = Object.assign({}, base.platformLinks, o.platformLinks || {});
  var liveSessions = [];
  if (Array.isArray(o.liveSessions) && o.liveSessions.length > 0) {
    liveSessions = o.liveSessions.map(function (s, i) {
      return Object.assign({}, defaultLiveSession(i), s, { id: (s && s.id) ? String(s.id) : 'ls_' + (i + 1) });
    });
  } else if (o.liveEntryUrl) {
    liveSessions = [Object.assign({}, defaultLiveSession(0), {
      entryUrl: String(o.liveEntryUrl),
      password: o.livePassword != null ? String(o.livePassword) : ''
    })];
  } else {
    liveSessions = JSON.parse(JSON.stringify(base.liveSessions));
  }
  liveSessions = normalizeLiveSessionsOrder(liveSessions);
  return {
    platformLinks: platformLinks,
    liveSessions: liveSessions,
    shenXiaoFuMiniLink: o.shenXiaoFuMiniLink != null ? String(o.shenXiaoFuMiniLink) : base.shenXiaoFuMiniLink,
  };
}

function readLearningRuntime() {
  var base = nwLearningRuntimeDefaults();

    var raw = localStorage.getItem(NW_LEARNING_RUNTIME_STORAGE_KEY);
    if (!raw) return JSON.parse(JSON.stringify(base));
    return normalizeLearningRuntimeObj(JSON.parse(raw));
  } catch (e) {
    return JSON.parse(JSON.stringify(base));
  }
}

/** 学习资源页：一级平台在系统浏览器中直接打开官网/H5；#小程序:// 将提示改为 https；公众号 mp 域名在微信内打开 */
function openExternalOrMiniProgramLink(url, titleForAlert) {
  if (!url || typeof url !== 'string' || !url.trim()) {
    window.alert((titleForAlert || '该入口') + '尚未配置链接，请向实施同事索要正式地址后写入原型配置。');
    return;
  }
  url = url.trim();
  if (url.indexOf('#小程序://') === 0) {
    window.alert(
      '「' +
        (titleForAlert || '该入口') +
        '」当前为 #小程序:// 短链。本原型已改为仅支持「明文 URL Scheme」（weixin://dl/business/?appid=&path=）。\n请在「学习外链配置」中改为 https 地址，或由管理员提供对应小程序的 AppId+path 后改代码接入。'
    );
    return;
  }
  /** 微信公众号：profile_ext / 任意图文链接等，仅微信内核可正常进号；外链需复制到微信 */
  if (/^https?:\/\/mp\.weixin\.qq\.com\//i.test(url)) {
    var uaMp = (navigator.userAgent || '').toLowerCase();
    var withHash = /#wechat_redirect/i.test(url) ? url : (url.replace(/#.*$/, '') + '#wechat_redirect');
    if (/micromessenger/.test(uaMp)) {
      window.location.href = withHash;
      return;
    }
    window.alert(
      '「' + (titleForAlert || '该公众号') + '」为微信平台链接，在系统浏览器中无法直接打开公众号主页。\n\n' +
        '请使用【手机微信】打开本页面后再点；或复制下面整段链接，发到微信任意聊天里再点开：\n\n' +
        withHash
    );
    return;
  }
  try {
    window.open(url, '_blank', 'noopener,noreferrer');
  } catch (e) {
    window.location.href = url;
  }
}

function nwOfficeDocNormalizeItem(t, i) {
  const id = t && t.id ? String(t.id) : 'tpl_' + String(i + 1);
  const name = t && t.name ? String(t.name).trim() : '未命名模板';
  const desc = t && t.desc != null ? String(t.desc) : '';
  const body = t && t.body != null ? String(t.body) : '';
  return { id, name, desc, body };
}

function readNwOfficeDocTemplates() {
  const defList = nwOfficeDocTemplatesDefault();
  const defById = new Map(defList.map((d) => [d.id, d]));
  try {
    const raw = localStorage.getItem(NW_OFFICE_DOC_TEMPLATES_KEY);
    if (!raw) return defList;
    const p = JSON.parse(raw);
    if (!Array.isArray(p) || p.length === 0) return defList;
    return p.map((t, idx) => {
      const n = nwOfficeDocNormalizeItem(t, idx);
      const fb = defById.get(n.id);
      if ((!n.body || !String(n.body).trim()) && fb && fb.body) return { ...n, body: fb.body };
      if (!n.body || !String(n.body).trim()) {
        return { ...n, body: `【${n.name}】\n\n请将【关键要素一】【关键要素二】等替换为实际内容后提交生成。\n\n【发文机关】\n【日期】` };
      }
      return n;
    });
  } catch (e) {
    return defList;
  }
}

function writeNwOfficeDocTemplates(arr) {
  const clean = (Array.isArray(arr) ? arr : []).map(nwOfficeDocNormalizeItem);
  try {
    localStorage.setItem(NW_OFFICE_DOC_TEMPLATES_KEY, JSON.stringify(clean));
  } catch (e) {}
  try {
    if (typeof BroadcastChannel !== 'undefined') {
      const bc = new BroadcastChannel(NW_OFFICE_DOC_TEMPLATES_BC);
      bc.postMessage({ t: 'doc_templates' });
      bc.close();
    }
  } catch (e2) {}
  try {
    window.dispatchEvent(new Event('nw-office-doc-templates-changed'));
  } catch (e3) {}
}

function useNavigation(initial = 'login') {
  const [history, setHistory] = React.useState([initial]);
  const [tabBarActive, setTabBarActive] = React.useState(null);
  const [userRole, setUserRole] = React.useState('member'); // 'member' | 'admin'
  const screen = history[history.length - 1];
  const navigateTo = React.useCallback((s, tab) => {
    setHistory(prev => [...prev, s]);
    if (tab !== undefined) setTabBarActive(tab);
  }, []);
  const goBack = React.useCallback(() => {
    setHistory(prev => prev.length > 1 ? prev.slice(0, -1) : prev);
  }, []);
  const switchTab = React.useCallback((tab, s) => {
    setTabBarActive(tab);
    setHistory([s]);
  }, []);
  return { screen, navigateTo, goBack, tabBarActive, switchTab, history, userRole, setUserRole };
}

    const f = e.target.files && e.target.files[0];

function isLivePromoVisibleNow(s) {
  var a = (s.promoStartAt || '').trim();
  var b = (s.promoEndAt || '').trim();
  if (!a && !b) return true;
  var now = Date.now();
  if (a) {
    var t = new Date(a).getTime();
    if (!isNaN(t) && now < t) return false;
  }
  if (b) {
    var t2 = new Date(b).getTime();
    if (!isNaN(t2) && now > t2) return false;
  }
  return true;
}

function formatLivePromoLine(s) {
  var a = (s.promoStartAt || '').trim();
  var b = (s.promoEndAt || '').trim();
  if (!a && !b) return '';
  var fmt = function (iso) {
    if (!iso) return '—';
    var d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    var p = function (n) { return String(n).padStart(2, '0'); };
    return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
  };
  return '宣传期：' + fmt(a) + ' — ' + fmt(b);
}

/** 按场次稳定哈希选色：通透渐变 + 顶光，贴合主色红与米白底 */
function hashLiveThemeKey(sess) {
  var raw = String(sess && sess.id ? sess.id : '') + '\n' + String(sess && sess.cardTitle ? sess.cardTitle : '') + '\n' + String(sess && sess.themeLine ? sess.themeLine : '');
  var h = 0;
  for (var i = 0; i < raw.length; i++) {
    h = ((h << 5) - h) + raw.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}

function glossOn(baseGrad) {
  return 'linear-gradient(180deg, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0.03) 28%, rgba(255,255,255,0) 52%), ' + baseGrad;
}

                </div>

        </div>

        <div style={{ ...lrStyles.sectionEyebrow, marginTop: 6 }}>进度与记录</div>
        <div style={lrStyles.sectionCard}>

            {ps.posterImage ? (

function nwMergedPastCoursesList() {
  const raw = nwReadPublishedCoursesRaw();
  const fromPc = raw.map((c) => ({
    id: String(c.id),
    title: c.name || c.title || '未命名课程',
    type: c.type || '视频',
    duration: c.duration || '—',
    publishedAt: c.publishedAt || '',
    status: (c.status === 'completed' || c.status === 'in_progress' || c.status === 'not_started') ? c.status : 'not_started',
    progress: typeof c.progress === 'number' ? c.progress : 0,
    category: c.category || 'political',
    fileName: c.fileName || '',
  }));
  const ids = new Set(fromPc.map((x) => x.id));
  const mockRest = PAST_COURSES_MOCK.filter((m) => !ids.has(String(m.id)));
  return [...fromPc, ...mockRest];
}

const PastCoursesScreen = ({ nav }) => {
  const [filter, setFilter] = React.useState('all');
  const [listTick, setListTick] = React.useState(0);
  const [catScope, setCatScope] = React.useState(() => {
    try { return sessionStorage.getItem(NW_PAST_COURSE_CAT_KEY) || 'all'; } catch (e) { return 'all'; }
  });
  const setCatScopeAndStore = (c) => {
    setCatScope(c);
    try { sessionStorage.setItem(NW_PAST_COURSE_CAT_KEY, c); } catch (e) {}
  };

  React.useEffect(() => {
    const bump = () => setListTick((t) => t + 1);
    window.addEventListener('storage', bump);
    const onVis = () => { if (document.visibilityState === 'visible') bump(); };
    document.addEventListener('visibilitychange', onVis);
    return () => {
      window.removeEventListener('storage', bump);
      document.removeEventListener('visibilitychange', onVis);
    };
  }, []);

  const allCourses = React.useMemo(() => nwMergedPastCoursesList(), [listTick]);
  const scopedList = allCourses.filter((c) => catScope === 'all' || c.category === catScope);
  const doneCount = scopedList.filter(c => c.status === 'completed').length;
  const undoneCount = scopedList.length - doneCount;
  const filtered = scopedList.filter(c => {
    if (filter === 'done') return c.status === 'completed';
    if (filter === 'undone') return c.status !== 'completed';
    return true;
  });
  const navTitle = catScope === 'all' ? '往期课程' : `往期课程 · ${PAST_COURSE_CAT_LABELS[catScope] || ''}`;

  const pcStyles = {
    wrap: { height: '100%', background: T.bg, display: 'flex', flexDirection: 'column' },
    summary: { padding: '10px 14px 12px', background: T.surface, borderBottom: `1px solid ${T.border}` },
    summaryText: { fontSize: 12, color: T.textSecondary, lineHeight: 1.55, marginBottom: 10 },
    summaryNums: { fontWeight: 700, color: T.primary },
    chips: { display: 'flex', gap: 8 },
    chip: (on) => ({
      padding: '6px 12px', borderRadius: 999, fontSize: 12, fontWeight: 600, cursor: 'pointer',
      background: on ? T.primary : '#FAFAF8', color: on ? '#fff' : T.textSecondary,
      border: on ? 'none' : `1px solid ${T.border}`
    }),
    list: { flex: 1, overflowY: 'auto', padding: '10px 14px 24px' },
    row: {
      width: '100%', textAlign: 'left', display: 'block', background: T.surface, border: `1px solid ${T.border}`,
      borderRadius: 14, padding: '12px 12px 10px', marginBottom: 10, cursor: 'pointer', boxShadow: '0 1px 3px rgba(0,0,0,0.04)',
      WebkitTapHighlightColor: 'transparent'
    },
    rowTop: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 10, marginBottom: 8 },
    rowTitle: { fontSize: 14, fontWeight: 600, color: T.textPrimary, lineHeight: 1.45, flex: 1, minWidth: 0 },
    badge: (st) => {
      if (st === 'completed') return { label: '已完成', bg: '#ECFDF5', color: T.success };
      if (st === 'in_progress') return { label: '学习中', bg: T.primaryLight, color: T.primary };
      return { label: '未学习', bg: '#F3F4F6', color: T.textMuted };
    },
    meta: { fontSize: 11, color: T.textMuted, display: 'flex', flexWrap: 'wrap', gap: 10 },
    barWrap: { marginTop: 8, height: 4, borderRadius: 2, background: '#F0EDEA', overflow: 'hidden' },
    barFill: (p) => ({ height: '100%', width: `${p}%`, background: p >= 100 ? T.success : T.primary, borderRadius: 2 })
  };

  return (
    <div style={pcStyles.wrap}>
      <NavBar title={navTitle} onBack={nav.goBack} />
      <div style={pcStyles.summary}>
        <div style={pcStyles.summaryText}>
          课程由 PC「课程与往期」发布，<strong>视频、音频、PPT、图文</strong>均可在本页进入详情查阅（与 PC 共用本地存储键演示同步）。当前分类下共 <span style={pcStyles.summaryNums}>{scopedList.length}</span> 门：
          已学完 <span style={pcStyles.summaryNums}>{doneCount}</span> 门，
          未学完 <span style={pcStyles.summaryNums}>{undoneCount}</span> 门（含进行中）。
        </div>
        <div style={{ ...pcStyles.chips, flexWrap: 'wrap', marginBottom: 8 }}>
          {[
            { id: 'all', label: '全部分类' },
            { id: 'political', label: '政治素养' },
            { id: 'ai_skill', label: 'AI 技能' },
            { id: 'grassroots', label: '基层治理' },
            { id: 'vocational', label: '职业技能' },
          ].map(t => (
            <button key={t.id} type="button" style={pcStyles.chip(catScope === t.id)} onClick={() => setCatScopeAndStore(t.id)}>
              {t.label}
            </button>
          ))}
        </div>
        <div style={pcStyles.chips}>
          {[
            { id: 'p_all', fk: 'all', label: '进度·全部' },
            { id: 'p_done', fk: 'done', label: '已学完' },
            { id: 'p_undone', fk: 'undone', label: '未学完' }
          ].map(t => (
            <button key={t.id} type="button" style={pcStyles.chip(filter === t.fk)} onClick={() => setFilter(t.fk)}>
              {t.label}
            </button>
          ))}
        </div>
      </div>
      <div style={pcStyles.list}>
        {filtered.map(c => {
          const b = pcStyles.badge(c.status);
          return (
            <button
              key={c.id}
              type="button"

                try {

                <span>{c.type}</span>
                <span>{c.duration}</span>

              )}
            </button>
          );
        })}
      </div>
    </div>
  );
};

    { name: '自有录播课', visits: 11, mins: '3h 20m', note: '含 30s 心跳', hue: '#5C6570' },
  ];
  function parseHmToMin(s) {
    var h = 0; var m = 0;
    var hm = s.match(/(\d+)\s*h/);
    var mm = s.match(/(\d+)\s*m/);
    if (hm) h = parseInt(hm[1], 10);
    if (mm) m = parseInt(mm[1], 10);
    return h * 60 + m;
  }
  var totalVisits = rows.reduce(function (a, r) { return a + r.visits; }, 0);

const MM_LIVE_SUMMARY_BULLETS = [
  '三季度学习计划需调整并明确集中学习与自学安排。',
  '党小组需同步传达；外出党员线上学习须可追溯。',

const NW_MEETING_LIVE_HISTORY_KEY = 'nw_meeting_live_history_v1';
const NW_MEETING_LIVE_DETAIL_ID_KEY = 'nw_meeting_live_detail_id_v1';

function formatMmLiveTime(totalSec) {
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function nwMeetingLiveTitleFromSegments(segments) {
  const t = segments && segments[0] && segments[0].text ? String(segments[0].text).replace(/\s+/g, ' ').trim() : '';
  if (!t) return '';
  return t.length > 26 ? `${t.slice(0, 26)}…` : t;
}

function nwMeetingLiveFallbackTitle(iso) {
  try {
    const d = new Date(iso);
    return `实时记录 · ${d.getMonth() + 1}月${d.getDate()}日 ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
  } catch (e) {
    return '实时记录';
  }
}

function nwMeetingLiveNormalizeRecord(r, i) {
  const id = r && r.id ? String(r.id) : `ml_${i}_${Date.now()}`;
  const title = r && r.title != null ? String(r.title).trim() : '';
  const createdAt = r && r.createdAt ? String(r.createdAt) : new Date().toISOString();
  const durationSec = Math.max(0, Math.floor(Number(r && r.durationSec != null ? r.durationSec : 0) || 0));
  const segments = Array.isArray(r && r.segments) ? r.segments.map((s) => ({
    speaker: s && s.speaker != null ? String(s.speaker) : '发言人',
    text: s && s.text != null ? String(s.text) : '',
  })) : [];
  let summaryBullets = Array.isArray(r && r.summaryBullets) ? r.summaryBullets.map((x) => String(x)) : [];
  if (!summaryBullets.length) summaryBullets = MM_LIVE_SUMMARY_BULLETS.slice();
  const audioRecorded = !!(r && r.audioRecorded);
  return { id, title: title || nwMeetingLiveFallbackTitle(createdAt), createdAt, durationSec, segments, summaryBullets, audioRecorded };
}

function readNwMeetingLiveHistory() {
  try {
    const raw = localStorage.getItem(NW_MEETING_LIVE_HISTORY_KEY);
    if (!raw) return [];
    const p = JSON.parse(raw);
    if (!Array.isArray(p)) return [];
    return p.map(nwMeetingLiveNormalizeRecord);
  } catch (e) {
    return [];
  }
}

function writeNwMeetingLiveHistory(arr) {
  const clean = (Array.isArray(arr) ? arr : []).map(nwMeetingLiveNormalizeRecord);
  try {
    localStorage.setItem(NW_MEETING_LIVE_HISTORY_KEY, JSON.stringify(clean));
  } catch (e) {}
  try {
    window.dispatchEvent(new Event('nw-meeting-live-history-changed'));
  } catch (e2) {}
}

function appendNwMeetingLiveRecord(rec) {
  const n = nwMeetingLiveNormalizeRecord(rec);
  const list = readNwMeetingLiveHistory();
  const next = [n, ...list].slice(0, 50);
  writeNwMeetingLiveHistory(next);
}

const MeetingMinutesRecorderScreen = ({ nav }) => {
  const [phase, setPhase] = React.useState('idle');
  const [sec, setSec] = React.useState(0);
  const [segments, setSegments] = React.useState([]);
  const demoNext = React.useRef(0);
  const scrollerRef = React.useRef(null);

  React.useEffect(() => {
    if (phase !== 'recording') return undefined;
    const id = window.setInterval(() => setSec((t) => t + 1), 1000);
    return () => window.clearInterval(id);
  }, [phase]);

  React.useEffect(() => {
    if (phase !== 'recording') return undefined;
    const id = window.setInterval(() => {
      setSegments((prev) => {
        const i = demoNext.current;
        if (i >= MM_LIVE_DEMO_SEGMENTS.length) return prev;
        demoNext.current = i + 1;
        return prev.concat([MM_LIVE_DEMO_SEGMENTS[i]]);
      });
    }, 2600);
    return () => window.clearInterval(id);
  }, [phase]);

  React.useEffect(() => {
    const el = scrollerRef.current;
    if (el) el.scrollTop = el.scrollHeight;
  }, [segments]);

  const startRec = () => {
    demoNext.current = 0;
    setSec(0);
    setSegments([]);
    setPhase('recording');
  };

function hwDemoReport(subject, stageLabel) {
  const sub = subject === 'english' ? '英语' : subject === 'chinese' ? '语文' : '数学';
  const items = subject === 'math'
    ? [
        { no: 1, status: 'ok', stem: '口算：72 − 28 = ?', yours: '44', right: '44', comment: '减法借位处理正确，书写清晰。', flaw: '', tip: '' },
        { no: 2, status: 'partial', stem: '应用题：买 3 支笔共花 15 元，每支多少钱？', yours: '列式 15÷3=4（元）', right: '15÷3=5（元）', comment: '思路正确，但除法结果算错，建议验算一遍商与乘法逆运算。', flaw: '计算失误', tip: '可用「商 × 除数 = 被除数」快速自检。' },
        { no: 3, status: 'wrong', stem: '简便计算：25×16', yours: '25×10+25×4=350', right: '25×4×4=400 或 25×8×2=400', comment: '拆数方式不简便且合并出错，未优先凑整。', flaw: '运算策略', tip: '优先把 16 拆成 4×4，先算 25×4 更稳。' },
      ]
    : subject === 'english'
      ? [
          { no: 1, status: 'ok', stem: '用所给词适当形式填空：She ___ (go) to school every day.', yours: 'goes', right: 'goes', comment: '第三人称单数一致，时态正确。', flaw: '', tip: '' },
          { no: 2, status: 'partial', stem: '句型转换：He doesn\'t like apples. → 肯定句', yours: 'He like apples.', right: 'He likes apples.', comment: '否定改肯定需去掉 doesn\'t 并还原动词第三人称形式。', flaw: '主谓一致', tip: '先找主语人称，再决定动词是否加 -s。' },
          { no: 3, status: 'wrong', stem: '翻译：「图书馆在教学楼后面」', yours: 'The library is behind of the classroom building.', right: 'The library is behind the classroom building.', comment: 'behind 为介词，一般不与 of 连用表方位。', flaw: '介词搭配', tip: '熟记 behind / in front of / next to 等固定搭配。' },
        ]
      : [
          { no: 1, status: 'ok', stem: '默写：「春风又绿江南岸」上一句。', yours: '明月何时照我还', right: '京口瓜洲一水间…（课内版本以教材为准）', comment: '与下句衔接记忆准确。', flaw: '', tip: '' },
          { no: 2, status: 'partial', stem: '概括本文主旨（不超过 40 字）', yours: '写了作者春游很开心。', right: '通过游踪与景物描写，表达对自然与生活的热爱。', comment: '有概括意识但偏「感受」、缺「写法与主题」层次。', flaw: '要点不全', tip: '可按「内容 + 情感 + 写法」三段各写一句再压缩。' },
          { no: 3, status: 'wrong', stem: '修改病句：他的成绩不断正在提高。', yours: '他的成绩正在不断提高。', right: '他的成绩不断提高。', comment: '「不断」与「正在」语义重复，保留其一即可。', flaw: '成分赘余', tip: '读一遍，删掉读起来重复的时间/程度词。' },
        ];
  const ok = items.filter((x) => x.status === 'ok').length;
  const partial = items.filter((x) => x.status === 'partial').length;
  const wrong = items.filter((x) => x.status === 'wrong').length;
  const score = subject === 'math' ? 84 : subject === 'english' ? 78 : 80;
  return {
    sub,
    stageLabel,
    score,
    total: 100,
    level: score >= 85 ? '优秀' : score >= 75 ? '良好' : '合格',
    tags: [`${stageLabel}`, `${sub}`, ok ? `${ok} 题全对` : '', partial ? `${partial} 题待完善` : '', wrong ? `${wrong} 题需订正` : ''].filter(Boolean),
    items,
  };
}

    { id: 'upper', label: '小学高年级' },

            <div
              style={{
                background: '#fff',
                borderRadius: 16,
                border: '1px solid rgba(180,83,9,0.15)',

                  </div>
                </div>
                <div style={{ fontSize: 13, fontWeight: 700, color: '#44403C', padding: '6px 12px', borderRadius: 10, background: amberSoft }}>{report.level}</div>

            <div style={{ fontSize: 11, fontWeight: 700, color: amber, letterSpacing: '0.08em', marginBottom: 8 }}>分题批改</div>
            {report.items.map((it) => {
              const st = statusLine(it.status);
              return (
                <div
                  key={it.no}
                  style={{
                    background: '#fff',
                    borderRadius: 14,
                    border: '1px solid rgba(180,83,9,0.12)',
                    padding: '12px 12px 12px 14px',
                    marginBottom: 10,
                    borderLeft: `4px solid ${st.c}`,

                </div>

            <button

              onClick={() => window.alert('正式版可接入大模型，针对错题继续追问讲解（演示）。')}
              style={{

                marginBottom: 8,

              }}

              批改另一份作业

    </div>
  );

      const normalized = (Array.isArray(parsed) ? parsed : []).map((r) => ({
        ...r,
        submitter: (r && r.submitter && r.submitter !== '未填写') ? r.submitter : '刘海宝',
      }));
      try {
        localStorage.setItem(AUDIT_RECORDS_STORAGE_KEY, JSON.stringify(normalized));
      } catch (x) {}
      setRecords(normalized);
    } catch (e) {
      setRecords([]);
    }
  }, []);

  React.useEffect(() => {
    loadRecords();
  }, [loadRecords]);

  const pickFiles = (setter) => (e) => {
    const names = Array.from(e.target.files || []).map(f => f.name);
    setter(prev => [...prev, ...names]);
    e.target.value = '';
  };

  const removeItem = (setter, idx) => {
    setter(prev => prev.filter((_, i) => i !== idx));
  };

  const runAudit = () => {
    const total = capturedPhotos.length + localPhotos.length + localFiles.length;
    if (!total) {
      alert('请先上传资料后再开始检核。');
      return;
    }
    const generated = [
      { level: 'high', title: '材料完整性缺失', desc: '发现 1 份材料缺少封面或签章页，请补拍完整页面。' },
      { level: 'mid', title: '图片清晰度不足', desc: '2 张图片存在反光/模糊，建议重拍并保持画面平整。' },
      { level: 'mid', title: '文件命名不规范', desc: '检测到文件命名未包含“姓名-门类-日期”，建议统一命名规则。' },
      { level: 'low', title: '跨资料项引用未对齐', desc: '部分佐证材料未在主表中建立对应索引，请补充关联说明。' },
    ];
    if (total <= 2) generated.pop();
    setIssues(generated);
    setAudited(true);

    const now = new Date();
    const record = {
      id: 'AR-' + now.getTime(),
      time: now.toLocaleString('zh-CN', { hour12: false }),
      source: '小程序端',
      submitter: currentSubmitter,
      totalFiles: total,
      captureCount: capturedPhotos.length,
      localPhotoCount: localPhotos.length,
      localFileCount: localFiles.length,
      issueCount: generated.length,
      highCount: generated.filter(g => g.level === 'high').length,
      status: generated.some(g => g.level === 'high') ? '待整改' : generated.length ? '建议复核' : '通过',
      issueTitles: generated.map(g => g.title),
    };
    try {
      const raw = localStorage.getItem(AUDIT_RECORDS_STORAGE_KEY);
      const parsed = raw ? JSON.parse(raw) : [];
      const next = [record, ...(Array.isArray(parsed) ? parsed : [])].slice(0, 60);
      localStorage.setItem(AUDIT_RECORDS_STORAGE_KEY, JSON.stringify(next));
      setRecords(next);
    } catch (e) {}
  };

  const uploadCard = { background: T.surface, borderRadius: 12, border: `1px solid ${T.border}`, padding: 12, marginBottom: 10 };
  const fileTag = { display: 'inline-flex', alignItems: 'center', gap: 6, padding: '4px 8px', borderRadius: 8, background: '#F8FAFC', border: `1px solid ${T.border}`, fontSize: 11, color: T.textSecondary };
  const actionBtn = { width: '100%', padding: '10px 0', borderRadius: 10, border: `1px dashed ${T.border}`, background: '#FFF', fontSize: 12, color: T.textPrimary, cursor: 'pointer' };
  const badge = (level) => ({ padding: '2px 8px', borderRadius: 8, fontSize: 11, fontWeight: 600, background: level === 'high' ? '#FFF0EE' : level === 'mid' ? '#FFFBEB' : '#F0FDF4', color: level === 'high' ? T.primary : level === 'mid' ? T.warning : T.success });

  return (
    <div style={{ height: '100%', background: T.bg, display: 'flex', flexDirection: 'column' }}>
      <NavBar title="智能资料审核" onBack={nav.goBack} />
      <div style={{ flex: 1, overflowY: 'auto', padding: '8px 14px 24px' }}>
        <Card style={{ marginBottom: 12, padding: 14 }}>
          <div style={{ fontSize: 14, fontWeight: 700, fontFamily: "'Noto Serif SC', serif", marginBottom: 6 }}>上传资料并自动检核</div>
          <div style={{ fontSize: 12, color: T.textSecondary, lineHeight: 1.65 }}>支持现拍照片、本地照片、本地文件组合上传；系统将输出资料审核问题清单。</div>
        </Card>

        <div style={uploadCard}>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8 }}>1) 现拍照片</div>
          <input ref={camRef} type="file" accept="image/*" capture="environment" style={{ display: 'none' }} multiple onChange={pickFiles(setCapturedPhotos)} />
          <button type="button" style={actionBtn} onClick={() => camRef.current && camRef.current.click()}>拍摄并上传</button>
          {capturedPhotos.length > 0 && (
            <div style={{ marginTop: 8, display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {capturedPhotos.map((n, i) => <span key={n + i} style={fileTag}>{n} <button type="button" onClick={() => removeItem(setCapturedPhotos, i)} style={{ border: 'none', background: 'transparent', cursor: 'pointer', color: T.textMuted }}>x</button></span>)}
            </div>
          )}
        </div>

        <div style={uploadCard}>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8 }}>2) 本地照片</div>
          <input ref={photoRef} type="file" accept="image/*" style={{ display: 'none' }} multiple onChange={pickFiles(setLocalPhotos)} />
          <button type="button" style={actionBtn} onClick={() => photoRef.current && photoRef.current.click()}>选择本地照片</button>
          {localPhotos.length > 0 && (
            <div style={{ marginTop: 8, display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {localPhotos.map((n, i) => <span key={n + i} style={fileTag}>{n} <button type="button" onClick={() => removeItem(setLocalPhotos, i)} style={{ border: 'none', background: 'transparent', cursor: 'pointer', color: T.textMuted }}>x</button></span>)}
            </div>
          )}
        </div>

        <div style={uploadCard}>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8 }}>3) 本地文件</div>
          <input ref={fileRef} type="file" accept=".pdf,.doc,.docx,.xls,.xlsx,.zip,.rar,.txt" style={{ display: 'none' }} multiple onChange={pickFiles(setLocalFiles)} />
          <button type="button" style={actionBtn} onClick={() => fileRef.current && fileRef.current.click()}>选择本地文件</button>
          {localFiles.length > 0 && (
            <div style={{ marginTop: 8, display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {localFiles.map((n, i) => <span key={n + i} style={fileTag}>{n} <button type="button" onClick={() => removeItem(setLocalFiles, i)} style={{ border: 'none', background: 'transparent', cursor: 'pointer', color: T.textMuted }}>x</button></span>)}
            </div>
          )}
        </div>

        <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
          <button type="button" onClick={runAudit} style={{ flex: 1, padding: '11px 0', borderRadius: 10, border: 'none', background: T.primary, color: '#fff', fontSize: 13, fontWeight: 600, cursor: 'pointer' }}>开始检核</button>
          <button type="button" onClick={() => { setCapturedPhotos([]); setLocalPhotos([]); setLocalFiles([]); setIssues([]); setAudited(false); }} style={{ flex: 1, padding: '11px 0', borderRadius: 10, border: `1px solid ${T.border}`, background: T.surface, fontSize: 13, fontWeight: 600, cursor: 'pointer', color: T.textPrimary }}>清空重选</button>
        </div>

        {audited && (
          <Card style={{ padding: 14 }}>
            <div style={{ fontSize: 14, fontWeight: 700, fontFamily: "'Noto Serif SC', serif", marginBottom: 10 }}>资料审核问题清单</div>
            {issues.length === 0 ? (
              <div style={{ fontSize: 12, color: T.success }}>未发现明显问题，建议人工复核关键页。</div>
            ) : (
              issues.map((it, i) => (
                <div key={i} style={{ paddingBottom: 10, marginBottom: 10, borderBottom: i < issues.length - 1 ? `1px solid ${T.border}` : 'none' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8, marginBottom: 6 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: T.textPrimary }}>{it.title}</div>
                    <span style={badge(it.level)}>{it.level === 'high' ? '严重' : it.level === 'mid' ? '一般' : '提示'}</span>
                  </div>
                  <div style={{ fontSize: 12, color: T.textSecondary, lineHeight: 1.6 }}>{it.desc}</div>
                </div>
              ))
            )}
          </Card>
        )}
        <Card style={{ padding: 14, marginTop: 12 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
            <div style={{ fontSize: 14, fontWeight: 700, fontFamily: "'Noto Serif SC', serif" }}>审核记录</div>
            <button
              type="button"
              onClick={loadRecords}
              style={{ border: `1px solid ${T.border}`, background: '#fff', borderRadius: 8, padding: '4px 10px', fontSize: 11, color: T.textMuted, cursor: 'pointer' }}
            >
              刷新
            </button>
          </div>
          {records.length === 0 ? (
            <div style={{ fontSize: 12, color: T.textMuted }}>暂无审核记录，完成一次检核后自动生成。</div>
          ) : (
            records.slice(0, 6).map((r, i) => (
              <div key={r.id || i} style={{ padding: '10px 0', borderBottom: i < Math.min(records.length, 6) - 1 ? `1px solid ${T.border}` : 'none' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', gap: 8, marginBottom: 4 }}>
                  <div style={{ fontSize: 12, fontWeight: 600, color: T.textPrimary }}>{r.id}</div>
                  <div style={{ fontSize: 11, color: T.textMuted, whiteSpace: 'nowrap' }}>{r.time}</div>
                </div>
                <div style={{ fontSize: 11, color: T.textSecondary, lineHeight: 1.6 }}>
                  提交人：{r.submitter || '刘海宝'} · 共 {r.totalFiles} 份（现拍 {r.captureCount} / 照片 {r.localPhotoCount} / 文件 {r.localFileCount}） · 问题 {r.issueCount} 条（严重 {r.highCount}） · 状态：{r.status}
                </div>
              </div>
            ))
          )}
        </Card>
      </div>
    </div>
  );
};

// ============================================
// App Root
// ============================================
function App() {
  const nav = useNavigation('login');

  const handleLogin = (role) => {
    nav.setUserRole(role);
    nav.navigateTo('home');
  };

  const renderScreen = () => {
    switch (nav.screen) {
      case 'login': return <LoginScreen onLogin={handleLogin} role={nav.userRole} setRole={nav.setUserRole} />;
      case 'home': return <HomeScreen nav={nav} />;
      case 'pioneerStoryDetail': return <PioneerStoryDetailScreen nav={nav} />;
      case 'profile': return <ProfileScreen nav={nav} role={nav.userRole} />;
      case 'activityHistory': return <ActivityHistoryScreen nav={nav} />;
      case 'checkin': return <CheckinScreen nav={nav} />;
      case 'scanVerify': return <ScanVerifyScreen nav={nav} />;
      case 'learning': return <LearningScreen nav={nav} />;
      case 'learningPlatformStats': return <LearningPlatformStatsScreen nav={nav} />;
      case 'pastCourses': return <PastCoursesScreen nav={nav} />;
      case 'courseDetail': return <CourseDetailScreen nav={nav} />;
      case 'aiProfile': return <AIProfileScreen nav={nav} />;
      case 'partyTools': return <PartyToolsScreen nav={nav} />;
      case 'archiveAudit': return <ArchiveSmartAuditScreen nav={nav} />;
      case 'liveActivity': return <LiveActivityScreen nav={nav} />;
      case 'aiQA': return <AIQAScreen nav={nav} />;
      case 'officeToolPlaceholder': return <OfficeToolPlaceholderScreen nav={nav} />;
      case 'meetingMinutesLive': return <MeetingMinutesHistoryHub nav={nav} />;
      case 'meetingMinutesRecorder': return <MeetingMinutesRecorderScreen nav={nav} />;
      case 'meetingMinutesDetail': return <MeetingMinutesDetailScreen nav={nav} />;
      case 'homeworkGrading': return <HomeworkGradingScreen nav={nav} />;
      case 'meetingNotice': return <MeetingNoticeScreen nav={nav} />;
      case 'docWriting': return <DocWritingScreen nav={nav} />;
      case 'career': return <CareerScreen nav={nav} />;
      case 'lifeServices': return <LifeServicesScreen nav={nav} />;
      case 'disposal': return <DisposalScreen nav={nav} />;
      case 'adminCheckinMgmt': return <AdminCheckinMgmtScreen nav={nav} />;
      case 'adminStats': return <AdminStatsScreen nav={nav} />;
      case 'adminMemberList': return <AdminMemberListScreen nav={nav} />;
      case 'adminExceptions': return <AdminExceptionsScreen nav={nav} />;
      default: return <HomeScreen nav={nav} />;
    }
  };

  const isLogin = nav.screen === 'login';
  const darkScreens = ['profile'];
  const isDark = darkScreens.includes(nav.screen);

  return (
    <div
      style={{
        minHeight: '100dvh',
        width: '100%',
        maxWidth: '100%',
        margin: 0,
        display: 'flex',
        flexDirection: 'column',
        background: isLogin ? '#fff' : isDark ? 'linear-gradient(180deg, #EDE9E4 0%, #FAF8F5 100%)' : T.bg,
        boxSizing: 'border-box',
      }}
    >
      <div style={{ flex: 1, minHeight: 0, display: 'flex', flexDirection: 'column', width: '100%' }}>
        {renderScreen()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
