  const sigColor = dark ? '#fff' : '#1a1a1a';

    <div style={IosFrameStyles.wrapper}>
      <div style={IosFrameStyles.bezel}>
        <div style={IosFrameStyles.screen}>
          {children}
          <div style={IosFrameStyles.island} />
          <div style={IosFrameStyles.statusBar}>
            <span style={{ color: sigColor, fontSize: 15, fontWeight: 700, fontFamily: '-apple-system, sans-serif' }}>{time}</span>
            <svg width="64" height="14" viewBox="0 0 64 14" fill="none">
              <rect x="0" y="3" width="3" height="8" rx="0.5" fill={sigColor}/>
              <rect x="4" y="2" width="3" height="9" rx="0.5" fill={sigColor}/>

function readILongGangMiniProgramShortLink() {
  try {
    var raw = localStorage.getItem(NW_ILG_MINIPROGRAM_LINK_KEY);
    var s = raw != null ? String(raw).trim() : '';
    if (s.indexOf('#小程序://') === 0) return s;
  } catch (e) {}

/** 当前是否处于「其它小程序」的 web-view 内（此时 #小程序:// 常需 JSSDK navigateToMiniProgram，纯 H5 短链可能无效） */
function isInsideWeChatMiniProgramWebView() {
  return typeof window.__wxjs_environment === 'string' && window.__wxjs_environment === 'miniprogram';
}

/** 微信内拉起小程序短链：优先用户直接点的 <a href>；此处为脚本回退：open / replace / href */
function tryOpenWeChatMiniProgramShortLink(link) {
  if (isInsideWeChatMiniProgramWebView()) {
    window.alert('当前页面在「微信小程序」内打开，从 web-view 直接唤起其它小程序常受限制。\n\n请将本页在系统浏览器中打开，或在微信聊天中发送以下短链后点击：\n\n' + link);
    return;
  }
  try {
    var w = window.open(link, '_top');
    if (w) return;
  } catch (e0) {}
  var topWin = window.top;
  try {
    if (topWin && topWin !== window) {
      topWin.location.replace(link);
      return;
    }
  } catch (e) {}
  try {
    window.location.replace(link);
    return;
  } catch (e2) {}
  try {
    var a = document.createElement('a');
    a.href = link;
    a.target = '_top';
    a.rel = 'noopener noreferrer';
    a.style.cssText = 'position:fixed;left:-9999px;top:0;width:1px;height:1px;opacity:0';
    document.body.appendChild(a);
    a.click();
    setTimeout(function () {
      try { a.remove(); } catch (x) {}
    }, 0);
    return;
  } catch (e3) {}
  window.location.href = link;
}

function isWeChatInAppBrowser() {
  var ua = (navigator.userAgent || '').toLowerCase();
  return /micromessenger/i.test(ua);
}

/** 从 #小程序:// 短链解析展示用名称（如 i龙岗） */
function guessMiniProgramNameFromShortLink(link) {
  var m = typeof link === 'string' ? /^#小程序:\/\/([^/]+)\//.exec(link.trim()) : null;
  return m ? m[1] : '微信小程序';
}

/**

  window.alert('「i龙岗」为微信小程序，请在手机微信或 Windows 微信内置浏览器中打开本页面后再点。\n\n也可复制下面整行到微信任意聊天里发送后点击：\n\n' + link);

}

function showNwAvatarLightbox(opts) {
  opts = opts || {};

  var hint = opts.hint || '轻触空白处、右上角 × 或「关闭」退出';
  var id = 'nw-avatar-lightbox-root';
  var old = document.getElementById(id);
  if (old) try { old.remove(); } catch (e0) {}

  function close() {
    try {
      document.removeEventListener('keydown', onKey);
    } catch (e1) {}
    try {
      el.remove();
    } catch (e2) {}
  }
  function onKey(e) {
    if (e.key === 'Escape') close();
  }

  var el = document.createElement('div');

  el.setAttribute('aria-modal', 'true');

  xbtn.setAttribute('aria-label', '关闭');
  xbtn.textContent = '×';
  xbtn.style.cssText =
    'position:fixed;top:12px;right:12px;width:44px;height:44px;border-radius:50%;border:none;background:rgba(255,255,255,0.14);color:#fff;font-size:26px;line-height:1;cursor:pointer;z-index:10003';
  xbtn.onclick = function (e) {

  };

  var panel = document.createElement('div');
  panel.style.cssText =
    'max-width:100%;max-height:86vh;display:flex;flex-direction:column;align-items:center;gap:12px;pointer-events:none';
  panel.addEventListener('click', function (e) {
    e.stopPropagation();
  });

  var size = Math.min(Math.floor(window.innerWidth * 0.78), 320);
  var hasImg = imageSrc && (imageSrc.indexOf('data:image') === 0 || /^https?:\/\//i.test(imageSrc));

  if (hasImg) {
    var img = document.createElement('img');
    img.src = imageSrc;
    img.alt = caption || '头像';
    img.style.cssText =
      'width:' +
      size +
      'px;height:' +
      size +
      'px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,0.22);box-shadow:0 12px 48px rgba(0,0,0,0.45);pointer-events:auto';
    panel.appendChild(img);
  } else {
    var fs = Math.max(40, Math.floor(size * 0.38));
    var circle = document.createElement('div');
    circle.textContent = letter;
    circle.style.cssText =
      'width:' +
      size +
      'px;height:' +
      size +
      'px;border-radius:50%;background:linear-gradient(160deg,#FFF0EE,#D44040);display:flex;align-items:center;justify-content:center;font-size:' +
      fs +
      'px;font-weight:700;color:#fff;font-family:Noto Serif SC,serif;border:3px solid rgba(255,255,255,0.25);box-sizing:border-box;pointer-events:auto';
    panel.appendChild(circle);

  if (caption) {
    var cap = document.createElement('div');
    cap.textContent = caption;
    cap.style.cssText = 'color:#fff;font-size:16px;font-weight:600;text-align:center;max-width:92vw;pointer-events:auto';
    panel.appendChild(cap);

  var hi = document.createElement('div');
  hi.textContent = hint;
  hi.style.cssText = 'color:rgba(255,255,255,0.55);font-size:12px;text-align:center;max-width:280px;line-height:1.5;pointer-events:auto';
  panel.appendChild(hi);

  var btn = document.createElement('button');
  btn.type = 'button';
  btn.textContent = '关闭';
  btn.style.cssText =
    'margin-top:4px;padding:11px 36px;border-radius:999px;border:1px solid rgba(255,255,255,0.35);background:rgba(255,255,255,0.12);color:#fff;font-size:14px;font-weight:600;cursor:pointer;pointer-events:auto';
  btn.onclick = function (e) {
    e.stopPropagation();

function normalizeLiveSessionsOrder(sessions) {
  if (!Array.isArray(sessions) || sessions.length === 0) return [];
  var arr = sessions.map(function (s, i) {
    var o = Object.assign({}, s, { _orig: i });
    return o;
  });
  arr.sort(function (a, b) {
    var ao = Number(a.sortOrder);
    var bo = Number(b.sortOrder);
    var av = Number.isFinite(ao) ? ao : a._orig;
    var bv = Number.isFinite(bo) ? bo : b._orig;
    if (av !== bv) return av - bv;
    return a._orig - b._orig;
  });
  return arr.map(function (s, i) {
    var out = Object.assign({}, s);
    delete out._orig;
    out.sortOrder = i;
    return out;
  });
}

function normalizeLearningRuntimeObj(o) {
  var base = nwLearningRuntimeDefaults();
  var platformLinks = Object.assign({}, base.platformLinks, o.platformLinks || {});
  var liveSessions = [];
  if (Array.isArray(o.liveSessions) && o.liveSessions.length > 0) {
    liveSessions = o.liveSessions.map(function (s, i) {
      return Object.assign({}, defaultLiveSession(i), s, { id: (s && s.id) ? String(s.id) : 'ls_' + (i + 1) });
    });
  } else if (o.liveEntryUrl) {
    liveSessions = [Object.assign({}, defaultLiveSession(0), {
      entryUrl: String(o.liveEntryUrl),
      password: o.livePassword != null ? String(o.livePassword) : ''
    })];
  } else {
    liveSessions = JSON.parse(JSON.stringify(base.liveSessions));
  }
  liveSessions = normalizeLiveSessionsOrder(liveSessions);
  return {
    platformLinks: platformLinks,
    liveSessions: liveSessions,
    shenXiaoFuMiniLink: o.shenXiaoFuMiniLink != null ? String(o.shenXiaoFuMiniLink) : base.shenXiaoFuMiniLink,
  };
}

function readLearningRuntime() {
  var base = nwLearningRuntimeDefaults();
  try {
    var raw = localStorage.getItem(NW_LEARNING_RUNTIME_STORAGE_KEY);
    if (!raw) return JSON.parse(JSON.stringify(base));
    return normalizeLearningRuntimeObj(JSON.parse(raw));
  } catch (e) {
    return JSON.parse(JSON.stringify(base));
  }
}

/** 学习资源页：一级平台在系统浏览器中直接打开官网/H5；若为 #小程序:// 则仅在微信内跳转；公众号 mp 域名在微信内打开 */
function openExternalOrMiniProgramLink(url, titleForAlert) {
  if (!url || typeof url !== 'string' || !url.trim()) {
    window.alert((titleForAlert || '该入口') + '尚未配置链接，请向实施同事索要正式地址后写入原型配置。');
    return;
  }
  url = url.trim();
  if (url.indexOf('#小程序://') === 0) {
    if (isWeChatInAppBrowser()) {
      showWeChatMiniProgramJumpModal(url, { appLabel: guessMiniProgramNameFromShortLink(url) });
      return;
    }
    window.alert('该入口为微信小程序短链，请在微信内打开本页面后再试；或复制下面整行到微信聊天中打开：\n\n' + url);
    return;
  }
  /** 微信公众号：profile_ext / 任意图文链接等，仅微信内核可正常进号；外链需复制到微信 */
  if (/^https?:\/\/mp\.weixin\.qq\.com\//i.test(url)) {
    var uaMp = (navigator.userAgent || '').toLowerCase();
    var withHash = /#wechat_redirect/i.test(url) ? url : (url.replace(/#.*$/, '') + '#wechat_redirect');
    if (/micromessenger/.test(uaMp)) {
      window.location.href = withHash;
      return;
    }
    window.alert(
      '「' + (titleForAlert || '该公众号') + '」为微信平台链接，在系统浏览器中无法直接打开公众号主页。\n\n' +
        '请使用【手机微信】打开本页面后再点；或复制下面整段链接，发到微信任意聊天里再点开：\n\n' +
        withHash
    );
    return;
  }
  try {
    window.open(url, '_blank', 'noopener,noreferrer');
  } catch (e) {
    window.location.href = url;
  }
}

function useNavigation(initial = 'login') {
  const [history, setHistory] = React.useState([initial]);
  const [tabBarActive, setTabBarActive] = React.useState(null);
  const [userRole, setUserRole] = React.useState('member'); // 'member' | 'admin'
  const screen = history[history.length - 1];
  const navigateTo = React.useCallback((s, tab) => {
    setHistory(prev => [...prev, s]);
    if (tab !== undefined) setTabBarActive(tab);
  }, []);
  const goBack = React.useCallback(() => {
    setHistory(prev => prev.length > 1 ? prev.slice(0, -1) : prev);
  }, []);
  const switchTab = React.useCallback((tab, s) => {
    setTabBarActive(tab);
    setHistory([s]);
  }, []);
  return { screen, navigateTo, goBack, tabBarActive, switchTab, history, userRole, setUserRole };
}

  const adminFileRef = React.useRef(null);

    const f = e.target.files && e.target.files[0];

function isLivePromoVisibleNow(s) {
  var a = (s.promoStartAt || '').trim();
  var b = (s.promoEndAt || '').trim();
  if (!a && !b) return true;
  var now = Date.now();
  if (a) {
    var t = new Date(a).getTime();
    if (!isNaN(t) && now < t) return false;
  }
  if (b) {
    var t2 = new Date(b).getTime();
    if (!isNaN(t2) && now > t2) return false;
  }
  return true;
}

function formatLivePromoLine(s) {
  var a = (s.promoStartAt || '').trim();
  var b = (s.promoEndAt || '').trim();
  if (!a && !b) return '';
  var fmt = function (iso) {
    if (!iso) return '—';
    var d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    var p = function (n) { return String(n).padStart(2, '0'); };
    return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
  };
  return '宣传期：' + fmt(a) + ' — ' + fmt(b);
}

/** 按场次稳定哈希选色：通透渐变 + 顶光，贴合主色红与米白底 */
function hashLiveThemeKey(sess) {
  var raw = String(sess && sess.id ? sess.id : '') + '\n' + String(sess && sess.cardTitle ? sess.cardTitle : '') + '\n' + String(sess && sess.themeLine ? sess.themeLine : '');
  var h = 0;
  for (var i = 0; i < raw.length; i++) {
    h = ((h << 5) - h) + raw.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}

function glossOn(baseGrad) {
  return 'linear-gradient(180deg, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0.03) 28%, rgba(255,255,255,0) 52%), ' + baseGrad;
}

                              }}

                            </button>
                          </div>
                        </div>
                      </div>
                    </div>
                  );

                </div>
              ) : null}
            </>

        </div>

        <div style={{ ...lrStyles.sectionEyebrow, marginTop: 6 }}>进度与记录</div>

                    </g>
                  ))}
                </g>
              </svg>
            );
          })()}
          <div style={apStyles.trendHint}>累计直播观看约 540 分钟（演示）。</div>

const LearningPlatformStatsScreen = ({ nav }) => {
  const rows = [
    { name: '共产党员网', visits: 28, mins: '4h 12m', note: 'onShow/onHide', hue: '#8B5A3C' },
    { name: '学习强国', visits: 42, mins: '6h 50m', note: 'onShow/onHide', hue: '#B83232' },
    { name: '深圳智慧党建', visits: 15, mins: '2h 05m', note: 'onShow/onHide', hue: '#1D6F8C' },
    { name: '自有录播课', visits: 11, mins: '3h 20m', note: '含 30s 心跳', hue: '#5C6570' },
  ];
  function parseHmToMin(s) {
    var h = 0; var m = 0;
    var hm = s.match(/(\d+)\s*h/);
    var mm = s.match(/(\d+)\s*m/);
    if (hm) h = parseInt(hm[1], 10);
    if (mm) m = parseInt(mm[1], 10);
    return h * 60 + m;
  }
  var totalVisits = rows.reduce(function (a, r) { return a + r.visits; }, 0);
  var totalMin = rows.reduce(function (a, r) { return a + parseHmToMin(r.mins); }, 0);
  var totalStayLabel = Math.floor(totalMin / 60) + 'h ' + String(totalMin % 60).padStart(2, '0') + 'm';
  return (
    <div style={{ height: '100%', background: T.bg, display: 'flex', flexDirection: 'column' }}>
      <NavBar title="外链学习明细" onBack={nav.goBack} />
      <div style={{ flex: 1, overflowY: 'auto', padding: '10px 14px 24px' }}>
        <div style={{
          borderRadius: 14, padding: '14px 16px', marginBottom: 14,
          background: 'linear-gradient(125deg, #FDFCFA 0%, #F4F1EC 100%)',
          border: `1px solid ${T.border}`, boxShadow: '0 2px 10px rgba(26,26,26,0.05)',

          <div style={{ fontSize: 11, color: T.textMuted, marginBottom: 8, lineHeight: 1.5 }}>统计口径与 PC「数据统计 → 外链平台学习行为」一致；以下为本人汇总（演示）。</div>

              <div style={{ fontSize: 10, color: T.textMuted, marginTop: 2 }}>总打开次数</div>
            </div>
            <div style={{ width: 1, alignSelf: 'stretch', background: T.border, margin: '4px 0' }} />
            <div>
              <div style={{ fontSize: 22, fontWeight: 700, color: T.textPrimary, fontFamily: "'Noto Serif SC', serif" }}>{totalStayLabel}</div>
              <div style={{ fontSize: 10, color: T.textMuted, marginTop: 2 }}>累计停留（各行合计）</div>
            </div>
          </div>
        </div>
        <div style={{
          background: T.surface, borderRadius: 16, overflow: 'hidden',
          border: `1px solid ${T.border}`, boxShadow: '0 2px 12px rgba(26,26,26,0.06)',
        }}>
          {rows.map((r, i) => (
            <div

                padding: '14px 16px', borderBottom: i < rows.length - 1 ? `1px solid ${T.border}` : 'none',

// ============================================
// Screen: Archive Smart Audit（与 PC「档案智能审核」门类口径一致）
// ============================================
const ArchiveSmartAuditScreen = ({ nav }) => {
  const [capturedPhotos, setCapturedPhotos] = React.useState([]);
  const [localPhotos, setLocalPhotos] = React.useState([]);
  const [localFiles, setLocalFiles] = React.useState([]);
  const [issues, setIssues] = React.useState([]);
  const [audited, setAudited] = React.useState(false);
  const [records, setRecords] = React.useState([]);
  const camRef = React.useRef(null);
  const photoRef = React.useRef(null);
  const fileRef = React.useRef(null);
  const currentSubmitter = nav && nav.userRole === 'admin' ? '李建国' : '刘海宝';

  const loadRecords = React.useCallback(() => {
    try {
      const raw = localStorage.getItem(AUDIT_RECORDS_STORAGE_KEY);
      const parsed = raw ? JSON.parse(raw) : [];
      const normalized = (Array.isArray(parsed) ? parsed : []).map((r) => ({
        ...r,
        submitter: (r && r.submitter && r.submitter !== '未填写') ? r.submitter : '刘海宝',
      }));
      try {
        localStorage.setItem(AUDIT_RECORDS_STORAGE_KEY, JSON.stringify(normalized));
      } catch (x) {}
      setRecords(normalized);
    } catch (e) {
      setRecords([]);
    }
  }, []);

  React.useEffect(() => {
    loadRecords();
  }, [loadRecords]);

  const pickFiles = (setter) => (e) => {
    const names = Array.from(e.target.files || []).map(f => f.name);
    setter(prev => [...prev, ...names]);
    e.target.value = '';
  };

  const removeItem = (setter, idx) => {
    setter(prev => prev.filter((_, i) => i !== idx));
  };

  const runAudit = () => {
    const total = capturedPhotos.length + localPhotos.length + localFiles.length;
    if (!total) {
      alert('请先上传资料后再开始检核。');
      return;
    }
    const generated = [
      { level: 'high', title: '材料完整性缺失', desc: '发现 1 份材料缺少封面或签章页，请补拍完整页面。' },
      { level: 'mid', title: '图片清晰度不足', desc: '2 张图片存在反光/模糊，建议重拍并保持画面平整。' },
      { level: 'mid', title: '文件命名不规范', desc: '检测到文件命名未包含“姓名-门类-日期”，建议统一命名规则。' },
      { level: 'low', title: '跨资料项引用未对齐', desc: '部分佐证材料未在主表中建立对应索引，请补充关联说明。' },
    ];
    if (total <= 2) generated.pop();
    setIssues(generated);
    setAudited(true);

    const now = new Date();
    const record = {
      id: 'AR-' + now.getTime(),
      time: now.toLocaleString('zh-CN', { hour12: false }),
      source: '小程序端',
      submitter: currentSubmitter,
      totalFiles: total,
      captureCount: capturedPhotos.length,
      localPhotoCount: localPhotos.length,
      localFileCount: localFiles.length,
      issueCount: generated.length,
      highCount: generated.filter(g => g.level === 'high').length,
      status: generated.some(g => g.level === 'high') ? '待整改' : generated.length ? '建议复核' : '通过',
      issueTitles: generated.map(g => g.title),
    };
    try {
      const raw = localStorage.getItem(AUDIT_RECORDS_STORAGE_KEY);
      const parsed = raw ? JSON.parse(raw) : [];
      const next = [record, ...(Array.isArray(parsed) ? parsed : [])].slice(0, 60);
      localStorage.setItem(AUDIT_RECORDS_STORAGE_KEY, JSON.stringify(next));
      setRecords(next);
    } catch (e) {}
  };

  const uploadCard = { background: T.surface, borderRadius: 12, border: `1px solid ${T.border}`, padding: 12, marginBottom: 10 };
  const fileTag = { display: 'inline-flex', alignItems: 'center', gap: 6, padding: '4px 8px', borderRadius: 8, background: '#F8FAFC', border: `1px solid ${T.border}`, fontSize: 11, color: T.textSecondary };
  const actionBtn = { width: '100%', padding: '10px 0', borderRadius: 10, border: `1px dashed ${T.border}`, background: '#FFF', fontSize: 12, color: T.textPrimary, cursor: 'pointer' };
  const badge = (level) => ({ padding: '2px 8px', borderRadius: 8, fontSize: 11, fontWeight: 600, background: level === 'high' ? '#FFF0EE' : level === 'mid' ? '#FFFBEB' : '#F0FDF4', color: level === 'high' ? T.primary : level === 'mid' ? T.warning : T.success });

  return (
    <div style={{ height: '100%', background: T.bg, display: 'flex', flexDirection: 'column' }}>
      <NavBar title="智能资料审核" onBack={nav.goBack} />
      <div style={{ flex: 1, overflowY: 'auto', padding: '8px 14px 24px' }}>
        <Card style={{ marginBottom: 12, padding: 14 }}>
          <div style={{ fontSize: 14, fontWeight: 700, fontFamily: "'Noto Serif SC', serif", marginBottom: 6 }}>上传资料并自动检核</div>
          <div style={{ fontSize: 12, color: T.textSecondary, lineHeight: 1.65 }}>支持现拍照片、本地照片、本地文件组合上传；系统将输出资料审核问题清单。</div>
        </Card>

        <div style={uploadCard}>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8 }}>1) 现拍照片</div>
          <input ref={camRef} type="file" accept="image/*" capture="environment" style={{ display: 'none' }} multiple onChange={pickFiles(setCapturedPhotos)} />
          <button type="button" style={actionBtn} onClick={() => camRef.current && camRef.current.click()}>拍摄并上传</button>
          {capturedPhotos.length > 0 && (
            <div style={{ marginTop: 8, display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {capturedPhotos.map((n, i) => <span key={n + i} style={fileTag}>{n} <button type="button" onClick={() => removeItem(setCapturedPhotos, i)} style={{ border: 'none', background: 'transparent', cursor: 'pointer', color: T.textMuted }}>x</button></span>)}
            </div>
          )}
        </div>

        <div style={uploadCard}>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8 }}>2) 本地照片</div>
          <input ref={photoRef} type="file" accept="image/*" style={{ display: 'none' }} multiple onChange={pickFiles(setLocalPhotos)} />
          <button type="button" style={actionBtn} onClick={() => photoRef.current && photoRef.current.click()}>选择本地照片</button>
          {localPhotos.length > 0 && (
            <div style={{ marginTop: 8, display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {localPhotos.map((n, i) => <span key={n + i} style={fileTag}>{n} <button type="button" onClick={() => removeItem(setLocalPhotos, i)} style={{ border: 'none', background: 'transparent', cursor: 'pointer', color: T.textMuted }}>x</button></span>)}
            </div>
          )}
        </div>

        <div style={uploadCard}>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8 }}>3) 本地文件</div>
          <input ref={fileRef} type="file" accept=".pdf,.doc,.docx,.xls,.xlsx,.zip,.rar,.txt" style={{ display: 'none' }} multiple onChange={pickFiles(setLocalFiles)} />
          <button type="button" style={actionBtn} onClick={() => fileRef.current && fileRef.current.click()}>选择本地文件</button>
          {localFiles.length > 0 && (
            <div style={{ marginTop: 8, display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {localFiles.map((n, i) => <span key={n + i} style={fileTag}>{n} <button type="button" onClick={() => removeItem(setLocalFiles, i)} style={{ border: 'none', background: 'transparent', cursor: 'pointer', color: T.textMuted }}>x</button></span>)}
            </div>
          )}
        </div>

        <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
          <button type="button" onClick={runAudit} style={{ flex: 1, padding: '11px 0', borderRadius: 10, border: 'none', background: T.primary, color: '#fff', fontSize: 13, fontWeight: 600, cursor: 'pointer' }}>开始检核</button>
          <button type="button" onClick={() => { setCapturedPhotos([]); setLocalPhotos([]); setLocalFiles([]); setIssues([]); setAudited(false); }} style={{ flex: 1, padding: '11px 0', borderRadius: 10, border: `1px solid ${T.border}`, background: T.surface, fontSize: 13, fontWeight: 600, cursor: 'pointer', color: T.textPrimary }}>清空重选</button>
        </div>

        {audited && (
          <Card style={{ padding: 14 }}>
            <div style={{ fontSize: 14, fontWeight: 700, fontFamily: "'Noto Serif SC', serif", marginBottom: 10 }}>资料审核问题清单</div>
            {issues.length === 0 ? (
              <div style={{ fontSize: 12, color: T.success }}>未发现明显问题，建议人工复核关键页。</div>
            ) : (
              issues.map((it, i) => (
                <div key={i} style={{ paddingBottom: 10, marginBottom: 10, borderBottom: i < issues.length - 1 ? `1px solid ${T.border}` : 'none' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8, marginBottom: 6 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: T.textPrimary }}>{it.title}</div>
                    <span style={badge(it.level)}>{it.level === 'high' ? '严重' : it.level === 'mid' ? '一般' : '提示'}</span>
                  </div>
                  <div style={{ fontSize: 12, color: T.textSecondary, lineHeight: 1.6 }}>{it.desc}</div>
                </div>
              ))
            )}
          </Card>
        )}
        <Card style={{ padding: 14, marginTop: 12 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
            <div style={{ fontSize: 14, fontWeight: 700, fontFamily: "'Noto Serif SC', serif" }}>审核记录</div>
            <button
              type="button"
              onClick={loadRecords}
              style={{ border: `1px solid ${T.border}`, background: '#fff', borderRadius: 8, padding: '4px 10px', fontSize: 11, color: T.textMuted, cursor: 'pointer' }}
            >
              刷新
            </button>
          </div>
          {records.length === 0 ? (
            <div style={{ fontSize: 12, color: T.textMuted }}>暂无审核记录，完成一次检核后自动生成。</div>
          ) : (
            records.slice(0, 6).map((r, i) => (
              <div key={r.id || i} style={{ padding: '10px 0', borderBottom: i < Math.min(records.length, 6) - 1 ? `1px solid ${T.border}` : 'none' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', gap: 8, marginBottom: 4 }}>
                  <div style={{ fontSize: 12, fontWeight: 600, color: T.textPrimary }}>{r.id}</div>
                  <div style={{ fontSize: 11, color: T.textMuted, whiteSpace: 'nowrap' }}>{r.time}</div>
                </div>
                <div style={{ fontSize: 11, color: T.textSecondary, lineHeight: 1.6 }}>
                  提交人：{r.submitter || '刘海宝'} · 共 {r.totalFiles} 份（现拍 {r.captureCount} / 照片 {r.localPhotoCount} / 文件 {r.localFileCount}） · 问题 {r.issueCount} 条（严重 {r.highCount}） · 状态：{r.status}
                </div>
              </div>
            ))
          )}
        </Card>
      </div>
    </div>
  );
};

// ============================================
// App Root
// ============================================
function App() {
  const nav = useNavigation('login');

  const handleLogin = (role) => {
    nav.setUserRole(role);
    nav.navigateTo('home');
  };

  const renderScreen = () => {
    switch (nav.screen) {
      case 'login': return <LoginScreen onLogin={handleLogin} role={nav.userRole} setRole={nav.setUserRole} />;
      case 'home': return <HomeScreen nav={nav} />;
      case 'profile': return <ProfileScreen nav={nav} role={nav.userRole} />;
      case 'activityHistory': return <ActivityHistoryScreen nav={nav} />;
      case 'checkin': return <CheckinScreen nav={nav} />;
      case 'scanVerify': return <ScanVerifyScreen nav={nav} />;
      case 'learning': return <LearningScreen nav={nav} />;
      case 'learningPlatformStats': return <LearningPlatformStatsScreen nav={nav} />;
      case 'pastCourses': return <PastCoursesScreen nav={nav} />;
      case 'courseDetail': return <CourseDetailScreen nav={nav} />;
      case 'aiProfile': return <AIProfileScreen nav={nav} />;
      case 'partyTools': return <PartyToolsScreen nav={nav} />;
      case 'archiveAudit': return <ArchiveSmartAuditScreen nav={nav} />;
      case 'liveActivity': return <LiveActivityScreen nav={nav} />;
      case 'aiQA': return <AIQAScreen nav={nav} />;
      case 'career': return <CareerScreen nav={nav} />;
      case 'lifeServices': return <LifeServicesScreen nav={nav} />;
      case 'disposal': return <DisposalScreen nav={nav} />;
      case 'adminCheckinMgmt': return <AdminCheckinMgmtScreen nav={nav} />;
      case 'adminStats': return <AdminStatsScreen nav={nav} />;
      case 'adminMemberList': return <AdminMemberListScreen nav={nav} />;
      case 'adminExceptions': return <AdminExceptionsScreen nav={nav} />;
      default: return <HomeScreen nav={nav} />;
    }
  };

  const isLogin = nav.screen === 'login';
  const darkScreens = ['profile'];
  const isDark = darkScreens.includes(nav.screen);

  return (
    <IosFrame time="9:41" battery={85} dark={isDark}>
      <div style={{ position: 'absolute', top: 54, left: 0, right: 0, bottom: 0 }}>
        {renderScreen()}
      </div>
    </IosFrame>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
